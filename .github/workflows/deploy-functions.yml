name: Deploy Supabase Edge Functions

# Auto-deploys edge functions to the Supabase project whenever the function
# code changes. Also runnable on demand (workflow_dispatch).
on:
  push:
    branches:
      - main
      - claude/vocab-learning-app-F7jwb
    paths:
      - "supabase/functions/**"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      PROJECT_REF: sdoglatrwspjivkztndx
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy chat-replies
        run: supabase functions deploy chat-replies --project-ref "$PROJECT_REF"
