<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff2e93"/>
      <stop offset="100%" stop-color="#9a2eff"/>
    </linearGradient>
    <linearGradient id="heart" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ff4da6"/>
      <stop offset="100%" stop-color="#ff2e93"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6"/>
      <feOffset dx="0" dy="4" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.25"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="115" fill="url(#bg)"/>

  <!-- Decorative sparkles -->
  <circle cx="110" cy="100" r="6" fill="white" opacity="0.4"/>
  <circle cx="420" cy="130" r="4" fill="white" opacity="0.5"/>
  <circle cx="80" cy="380" r="5" fill="white" opacity="0.4"/>
  <circle cx="430" cy="400" r="7" fill="white" opacity="0.35"/>

  <!-- Speech bubble -->
  <g filter="url(#shadow)">
    <path d="
      M 110 175
      Q 110 130 155 130
      L 357 130
      Q 402 130 402 175
      L 402 295
      Q 402 340 357 340
      L 245 340
      L 190 395
      L 208 340
      L 155 340
      Q 110 340 110 295
      Z
    " fill="white"/>
  </g>

  <!-- Heart inside bubble -->
  <path d="
    M 256 297
    C 240 281, 192 253, 192 217
    C 192 195, 210 180, 230 180
    C 244 180, 252 188, 256 196
    C 260 188, 268 180, 282 180
    C 302 180, 320 195, 320 217
    C 320 253, 272 281, 256 297
    Z
  " fill="url(#heart)"/>

  <!-- Small shine on heart -->
  <ellipse cx="220" cy="205" rx="10" ry="6" fill="white" opacity="0.45" transform="rotate(-30 220 205)"/>
</svg>
