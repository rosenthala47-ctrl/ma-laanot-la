<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<meta name="theme-color" content="#07050f" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<title>מה לענות לה? 💬</title>
<link rel="manifest" href="manifest.json" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700;800;900&display=swap" rel="stylesheet" />
<style>
/* =================== DESIGN TOKENS =================== */
:root {
  --bg: #07050f;
  --bg-2: #0d0820;
  --surface: rgba(255,255,255,0.04);
  --surface-2: rgba(255,255,255,0.07);
  --surface-3: rgba(255,255,255,0.10);
  --stroke: rgba(255,255,255,0.08);
  --stroke-2: rgba(255,255,255,0.16);
  --pink: #ff2e93;
  --purple: #9d4eff;
  --cyan: #00e5ff;
  --yellow: #ffd93d;
  --orange: #ff9a3d;
  --green: #00ffa3;
  --red: #ff4566;
  --text: #ffffff;
  --text-2: #c5b8e8;
  --text-3: #8678a8;
  --text-4: #4f4570;
  --grad-1: linear-gradient(135deg, #ff2e93 0%, #9d4eff 50%, #00e5ff 100%);
  --grad-2: linear-gradient(135deg, #9d4eff 0%, #00e5ff 100%);
  --grad-3: linear-gradient(135deg, #ff2e93 0%, #ff9a3d 100%);
  --grad-fire: linear-gradient(135deg, #ff9a3d 0%, #ff2e93 100%);
  --shadow-glow: 0 8px 32px rgba(157, 78, 255, 0.4);
  --shadow-card: 0 12px 40px rgba(0,0,0,0.5);
  --spring: cubic-bezier(0.34, 1.56, 0.64, 1);
  --ease: cubic-bezier(0.4, 0, 0.2, 1);
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}

* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; -webkit-touch-callout:none; }
*:focus-visible { outline:2px solid var(--cyan); outline-offset:2px; border-radius:8px; }

html, body {
  height:100%; overscroll-behavior:none; overflow:hidden;
  background:var(--bg); color:var(--text);
  font-family:'Heebo',-apple-system,BlinkMacSystemFont,sans-serif;
  font-weight:500; -webkit-font-smoothing:antialiased; -moz-osx-font-smoothing:grayscale;
}

button, input, textarea, select { font-family:inherit; color:inherit; }

/* =================== AMBIENT BACKGROUND =================== */
.bg-glow {
  position:fixed; inset:0; z-index:0; pointer-events:none; overflow:hidden;
}
.bg-glow::before, .bg-glow::after {
  content:''; position:absolute; border-radius:50%; filter:blur(120px); opacity:0.35;
}
.bg-glow::before {
  width:500px; height:500px; background:var(--pink);
  top:-200px; right:-150px;
  animation:floatA 18s ease-in-out infinite;
}
.bg-glow::after {
  width:450px; height:450px; background:var(--purple);
  bottom:-150px; left:-150px;
  animation:floatB 22s ease-in-out infinite;
}
@keyframes floatA { 0%,100%{transform:translate(0,0) scale(1);} 50%{transform:translate(-80px,120px) scale(1.15);} }
@keyframes floatB { 0%,100%{transform:translate(0,0) scale(1);} 50%{transform:translate(100px,-80px) scale(1.2);} }

/* =================== APP SHELL =================== */
#app {
  position:fixed; inset:0; z-index:1; display:flex; flex-direction:column;
  max-width:560px; margin:0 auto;
  padding-top:var(--safe-top);
  padding-bottom:var(--safe-bottom);
}

.screen {
  position:absolute; inset:0; padding-top:calc(var(--safe-top) + 0px);
  padding-bottom:calc(var(--safe-bottom) + 0px);
  display:flex; flex-direction:column;
  opacity:0; pointer-events:none;
  transition: opacity 0.35s var(--ease), transform 0.4s var(--ease);
  transform:translateX(20px);
}
.screen.active { opacity:1; pointer-events:auto; transform:translateX(0); z-index:2; }
.screen.exit-left { transform:translateX(-20px); }
.screen-scroll {
  flex:1; overflow-y:auto; overflow-x:hidden;
  -webkit-overflow-scrolling:touch;
  padding:0 20px;
  padding-bottom:120px;
  scrollbar-width:none;
}
.screen-scroll::-webkit-scrollbar { display:none; }

/* =================== TOP BAR =================== */
.topbar {
  display:flex; align-items:center; justify-content:space-between;
  padding:14px 20px 10px; gap:10px;
  position:sticky; top:0; z-index:10;
  background:linear-gradient(to bottom, var(--bg) 60%, transparent);
  backdrop-filter:blur(20px);
}
.topbar-title {
  font-size:22px; font-weight:900; letter-spacing:-0.5px;
  background:var(--grad-1); -webkit-background-clip:text; background-clip:text;
  -webkit-text-fill-color:transparent;
}
.topbar-actions { display:flex; gap:8px; align-items:center; }

.streak-chip {
  display:inline-flex; align-items:center; gap:4px;
  background:linear-gradient(135deg, rgba(255,154,61,0.15), rgba(255,46,147,0.15));
  border:1px solid rgba(255,154,61,0.3);
  border-radius:999px; padding:6px 12px;
  font-weight:800; font-size:14px;
  color:#ffce8c;
  cursor:pointer; transition:all 0.2s var(--ease);
}
.streak-chip:active { transform:scale(0.94); }
.streak-chip .fire { animation:fireFlicker 1.6s ease-in-out infinite; display:inline-block; }
@keyframes fireFlicker {
  0%,100% { transform:scale(1) rotate(-3deg); filter:drop-shadow(0 0 4px rgba(255,154,61,0.6)); }
  50% { transform:scale(1.15) rotate(3deg); filter:drop-shadow(0 0 8px rgba(255,46,147,0.8)); }
}

.icon-btn {
  width:40px; height:40px; border-radius:50%;
  background:var(--surface); border:1px solid var(--stroke);
  display:flex; align-items:center; justify-content:center;
  font-size:18px; cursor:pointer; transition:all 0.2s var(--ease);
}
.icon-btn:active { transform:scale(0.9); background:var(--surface-2); }

/* =================== BOTTOM NAV =================== */
.bottom-nav {
  position:absolute; bottom:0; left:0; right:0;
  padding:8px 12px calc(8px + var(--safe-bottom));
  background:rgba(7,5,15,0.85); backdrop-filter:blur(24px);
  border-top:1px solid var(--stroke);
  display:grid; grid-template-columns:repeat(4, 1fr);
  z-index:50;
}
.nav-item {
  display:flex; flex-direction:column; align-items:center; gap:3px;
  padding:8px 4px; cursor:pointer; border-radius:14px;
  color:var(--text-3); transition:all 0.25s var(--ease);
  position:relative;
}
.nav-item:active { transform:scale(0.92); }
.nav-item .nav-icon { font-size:22px; transition:transform 0.3s var(--spring); }
.nav-item .nav-label { font-size:10px; font-weight:700; }
.nav-item.active { color:var(--text); }
.nav-item.active .nav-icon { transform:translateY(-3px) scale(1.15); }
.nav-item.active::before {
  content:''; position:absolute; top:0; left:50%; transform:translateX(-50%);
  width:30px; height:3px; border-radius:0 0 4px 4px;
  background:var(--grad-1);
}

/* =================== AUTH / SPLASH =================== */
.splash {
  flex:1; display:flex; flex-direction:column; justify-content:center; align-items:center;
  padding:40px 32px; text-align:center;
}
.splash-logo {
  font-size:80px; margin-bottom:18px;
  animation:logoFloat 4s ease-in-out infinite;
  filter:drop-shadow(0 0 40px rgba(255,46,147,0.5));
}
@keyframes logoFloat { 0%,100%{transform:translateY(0) rotate(-3deg);} 50%{transform:translateY(-12px) rotate(3deg);} }

.splash-title {
  font-size:42px; font-weight:900; letter-spacing:-1px; line-height:1.05;
  background:var(--grad-1); -webkit-background-clip:text; background-clip:text;
  -webkit-text-fill-color:transparent;
  margin-bottom:10px;
  animation:fadeUp 0.7s var(--ease) both 0.1s;
}
.splash-subtitle {
  font-size:16px; color:var(--text-2); font-weight:500;
  margin-bottom:40px; line-height:1.5;
  animation:fadeUp 0.7s var(--ease) both 0.2s;
}
@keyframes fadeUp { from{opacity:0; transform:translateY(20px);} to{opacity:1; transform:translateY(0);} }

.auth-form { width:100%; max-width:380px; animation:fadeUp 0.7s var(--ease) both 0.3s; }

.input {
  width:100%; background:var(--surface-2); border:1.5px solid var(--stroke);
  border-radius:18px; padding:16px 18px;
  font-size:16px; font-weight:500;
  transition:all 0.25s var(--ease); direction:rtl;
}
.input::placeholder { color:var(--text-3); }
.input:focus {
  outline:none; border-color:var(--pink);
  background:var(--surface-3);
  box-shadow:0 0 0 4px rgba(255,46,147,0.15);
}
.input-row { margin-bottom:12px; }
.input-row:last-child { margin-bottom:0; }

textarea.input { min-height:90px; resize:none; line-height:1.5; }

select.input {
  appearance:none;
  background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='14' height='14' viewBox='0 0 24 24' fill='none' stroke='%23c5b8e8' stroke-width='2.5'><polyline points='6 9 12 15 18 9'/></svg>");
  background-repeat:no-repeat; background-position:left 18px center;
  padding-left:46px;
}

.label { display:block; font-size:13px; font-weight:700; color:var(--text-2); margin-bottom:8px; }

/* =================== BUTTONS =================== */
.btn {
  width:100%; border:none; border-radius:18px; padding:16px 18px;
  font-weight:800; font-size:16px; cursor:pointer;
  display:flex; align-items:center; justify-content:center; gap:8px;
  transition:transform 0.15s var(--ease), box-shadow 0.25s var(--ease), opacity 0.2s;
  user-select:none;
}
.btn:active { transform:scale(0.97); }
.btn:disabled { opacity:0.55; cursor:not-allowed; }

.btn-primary {
  background:var(--grad-1); color:white;
  box-shadow:0 8px 28px rgba(255,46,147,0.4);
  font-size:17px; padding:18px;
}
.btn-primary:active { box-shadow:0 4px 14px rgba(255,46,147,0.5); }

.btn-secondary {
  background:var(--surface-2); color:var(--text);
  border:1.5px solid var(--stroke-2);
}

.btn-ghost {
  background:transparent; color:var(--text-2);
  font-weight:600; padding:12px;
}

.btn-danger {
  background:rgba(255,69,102,0.12); color:var(--red);
  border:1.5px solid rgba(255,69,102,0.3);
}

.btn-row { display:flex; gap:10px; }
.btn-row > * { flex:1; }

/* Toggle for login/signup */
.auth-toggle {
  text-align:center; margin-top:18px;
  color:var(--text-2); font-size:14px;
}
.auth-toggle a { color:var(--pink); font-weight:800; cursor:pointer; }

/* =================== CARDS / SECTIONS =================== */
.card {
  background:var(--surface);
  border:1px solid var(--stroke);
  border-radius:22px; padding:18px;
  backdrop-filter:blur(20px);
  margin-bottom:14px;
}
.card-glass {
  background:var(--surface-2);
  border:1px solid var(--stroke-2);
}
.card-title {
  font-size:13px; font-weight:800; color:var(--text-2);
  margin-bottom:12px; letter-spacing:0.3px;
  display:flex; align-items:center; gap:6px;
}
.card-title-big { font-size:18px; color:var(--text); }

.section-title {
  font-size:22px; font-weight:900; letter-spacing:-0.5px;
  margin:8px 0 14px;
}

/* =================== WELCOME =================== */
.greet-card {
  padding:22px;
  background:linear-gradient(135deg, rgba(157,78,255,0.12), rgba(0,229,255,0.08));
  border:1px solid var(--stroke-2);
  border-radius:24px;
  margin-bottom:16px;
}
.greet-hello {
  font-size:13px; color:var(--text-2); font-weight:600; margin-bottom:4px;
}
.greet-name {
  font-size:26px; font-weight:900; letter-spacing:-0.5px;
  background:var(--grad-1); -webkit-background-clip:text; background-clip:text;
  -webkit-text-fill-color:transparent; line-height:1.1; margin-bottom:6px;
}
.greet-sub { font-size:14px; color:var(--text-2); }
.tier-pill {
  display:inline-flex; align-items:center; gap:5px;
  margin-top:10px;
  font-size:11px; font-weight:800; padding:5px 10px; border-radius:999px;
  background:var(--surface-3); border:1px solid var(--stroke);
  color:var(--text-2);
}
.tier-pill.plus {
  background:linear-gradient(135deg, rgba(157,78,255,0.25), rgba(0,229,255,0.2));
  border-color:var(--purple); color:var(--cyan);
}
.tier-pill.pro {
  background:var(--grad-1); border-color:transparent; color:white;
  box-shadow:0 4px 14px rgba(255,46,147,0.4);
}

/* =================== MODE TABS =================== */
.mode-tabs {
  display:grid; grid-template-columns:repeat(3, 1fr); gap:6px;
  background:var(--surface); border:1px solid var(--stroke);
  border-radius:18px; padding:5px; margin-bottom:16px;
}
.mode-tab {
  background:transparent; border:none; color:var(--text-3);
  padding:10px 6px; border-radius:14px; cursor:pointer;
  font-size:13px; font-weight:700;
  display:flex; flex-direction:column; align-items:center; gap:3px;
  transition:all 0.3s var(--ease); position:relative;
}
.mode-tab .mode-emoji { font-size:18px; }
.mode-tab:active { transform:scale(0.95); }
.mode-tab.active {
  background:var(--grad-1); color:white;
  box-shadow:0 4px 16px rgba(255,46,147,0.35);
}
.mode-tab.locked { opacity:0.55; }
.mode-tab .lock {
  position:absolute; top:3px; left:4px; font-size:11px;
  background:var(--yellow); color:#3a2a00; border-radius:6px;
  padding:1px 4px; font-weight:800;
}

/* =================== CRUSH SELECTOR =================== */
.crush-row {
  display:flex; align-items:center; gap:12px;
  background:var(--surface); border:1px solid var(--stroke);
  border-radius:18px; padding:12px 14px; margin-bottom:14px;
  cursor:pointer; transition:all 0.2s var(--ease);
}
.crush-row:active { transform:scale(0.98); background:var(--surface-2); }
.crush-avatar {
  width:44px; height:44px; border-radius:50%;
  background:var(--grad-1); color:white;
  display:flex; align-items:center; justify-content:center;
  font-weight:900; font-size:18px; flex-shrink:0;
  box-shadow:0 4px 14px rgba(255,46,147,0.3);
}
.crush-info { flex:1; min-width:0; }
.crush-name { font-weight:800; font-size:15px; }
.crush-meta { font-size:12px; color:var(--text-3); margin-top:2px; }
.crush-chevron { color:var(--text-3); font-size:18px; }

/* =================== STYLE CHIPS =================== */
.styles-scroll {
  display:flex; gap:8px; overflow-x:auto; padding:4px 0 6px;
  scrollbar-width:none; margin:0 -20px; padding-left:20px; padding-right:20px;
  scroll-snap-type:x mandatory;
}
.styles-scroll::-webkit-scrollbar { display:none; }
.style-chip {
  flex:0 0 auto; scroll-snap-align:start;
  background:var(--surface); border:1.5px solid var(--stroke);
  border-radius:14px; padding:10px 14px;
  display:flex; align-items:center; gap:6px;
  font-weight:700; font-size:13px; color:var(--text-2);
  cursor:pointer; transition:all 0.25s var(--ease);
  white-space:nowrap;
}
.style-chip:active { transform:scale(0.94); }
.style-chip .se { font-size:18px; }
.style-chip.active {
  background:var(--grad-1); color:white; border-color:transparent;
  box-shadow:0 6px 18px rgba(255,46,147,0.4);
  transform:scale(1.04);
}

/* =================== INPUT AREA (chat-style) =================== */
.input-bubble {
  background:var(--surface-2); border:1.5px solid var(--stroke);
  border-radius:22px; padding:14px 16px;
  transition:all 0.25s var(--ease);
  position:relative;
}
.input-bubble:focus-within {
  border-color:var(--pink);
  background:var(--surface-3);
  box-shadow:0 0 0 4px rgba(255,46,147,0.12);
}
.input-bubble textarea {
  width:100%; background:transparent; border:none;
  font-size:15px; resize:none; line-height:1.5;
  min-height:70px; outline:none; color:var(--text);
}
.input-bubble textarea::placeholder { color:var(--text-3); }

.input-actions {
  display:flex; gap:8px; margin-top:10px; align-items:center; justify-content:flex-end;
}
.input-action {
  background:var(--surface-3); border:1px solid var(--stroke);
  border-radius:12px; padding:8px 12px; font-size:13px; font-weight:700;
  color:var(--text-2); cursor:pointer; display:inline-flex; align-items:center; gap:5px;
  transition:all 0.2s var(--ease);
}
.input-action:active { transform:scale(0.94); }
.input-action.attached { color:var(--cyan); border-color:var(--cyan); }

/* Hidden file input */
.file-hidden { position:absolute; opacity:0; width:0; height:0; }

.image-preview {
  margin-top:10px; border-radius:16px; overflow:hidden;
  position:relative; border:1.5px solid var(--stroke);
}
.image-preview img { width:100%; display:block; max-height:300px; object-fit:contain; background:var(--bg-2); }
.image-preview .remove-img {
  position:absolute; top:8px; left:8px;
  background:rgba(0,0,0,0.7); border:none; border-radius:50%;
  width:28px; height:28px; color:white; cursor:pointer; backdrop-filter:blur(8px);
}

/* =================== GENERATE BUTTON =================== */
.fab-generate {
  width:100%; padding:18px 20px;
  background:var(--grad-1); color:white;
  border:none; border-radius:22px;
  font-size:17px; font-weight:900;
  display:flex; align-items:center; justify-content:center; gap:10px;
  cursor:pointer;
  box-shadow:0 10px 30px rgba(255,46,147,0.45);
  transition:transform 0.15s var(--ease), box-shadow 0.25s var(--ease);
  margin-top:14px;
  position:relative; overflow:hidden;
}
.fab-generate:active { transform:scale(0.97); }
.fab-generate:disabled { opacity:0.55; }
.fab-generate::after {
  content:''; position:absolute; top:0; left:-100%; width:60%; height:100%;
  background:linear-gradient(90deg, transparent, rgba(255,255,255,0.25), transparent);
  animation:shine 3.5s ease-in-out infinite;
}
@keyframes shine { 0%,100% { left:-100%; } 50% { left:100%; } }
.fab-generate .sparkle {
  display:inline-block; animation:sparkleSpin 2s linear infinite;
}
@keyframes sparkleSpin { 0%,100%{transform:rotate(0) scale(1);} 50%{transform:rotate(180deg) scale(1.2);} }

.usage-line {
  font-size:12px; color:var(--text-3);
  text-align:center; margin-top:10px;
}
.usage-line.low { color:var(--yellow); font-weight:700; }
.usage-line.empty { color:var(--red); font-weight:700; }

/* =================== RESULTS (chat bubbles) =================== */
.results-wrap { margin-top:24px; }
.results-header {
  display:flex; align-items:center; justify-content:space-between;
  margin-bottom:14px;
}
.results-title {
  font-size:18px; font-weight:900;
}
.results-meta {
  font-size:11px; color:var(--text-3); background:var(--surface);
  border:1px solid var(--stroke); padding:5px 10px; border-radius:999px;
  font-weight:700;
}

.bubble {
  background:var(--surface-2); border:1px solid var(--stroke-2);
  border-radius:22px 22px 22px 6px;
  padding:16px 18px; margin-bottom:12px;
  position:relative;
  animation:bubbleIn 0.5s var(--spring) both;
  backdrop-filter:blur(20px);
}
.bubble:nth-child(1) { animation-delay:0.05s; }
.bubble:nth-child(2) { animation-delay:0.18s; }
.bubble:nth-child(3) { animation-delay:0.31s; }
@keyframes bubbleIn {
  from { opacity:0; transform:translateY(20px) scale(0.95); }
  to { opacity:1; transform:translateY(0) scale(1); }
}

.bubble-tag {
  position:absolute; top:-10px; right:14px;
  background:var(--grad-1); color:white;
  font-size:11px; font-weight:900; padding:4px 10px; border-radius:999px;
  letter-spacing:0.3px;
}
.bubble-text {
  font-size:16px; line-height:1.6; color:var(--text);
  white-space:pre-wrap; word-wrap:break-word;
  margin-bottom:14px; margin-top:4px;
}
.bubble-actions {
  display:flex; gap:8px; flex-wrap:wrap;
}
.action-btn {
  background:var(--surface-3); border:1px solid var(--stroke);
  border-radius:12px; padding:9px 14px;
  font-size:13px; font-weight:700; color:var(--text-2);
  cursor:pointer; display:inline-flex; align-items:center; gap:6px;
  transition:all 0.25s var(--ease);
}
.action-btn:active { transform:scale(0.94); }
.action-btn.copied {
  background:var(--green); color:#003822; border-color:var(--green);
}
.action-btn.wa {
  background:#25D366; color:#003814; border-color:#25D366;
}
.action-btn.wa:active { background:#1bb858; }

/* =================== LOADING =================== */
.loading-zone {
  display:none; padding:36px 20px; text-align:center;
}
.loading-zone.active { display:block; animation:fadeUp 0.4s var(--ease); }
.loader-dots {
  display:inline-flex; gap:8px; margin-bottom:14px;
}
.loader-dots span {
  width:12px; height:12px; border-radius:50%;
  background:var(--pink);
  animation:dotBounce 1.4s ease-in-out infinite;
}
.loader-dots span:nth-child(2) { background:var(--purple); animation-delay:0.16s; }
.loader-dots span:nth-child(3) { background:var(--cyan); animation-delay:0.32s; }
@keyframes dotBounce {

@keyframes shimmer { from{transform:translateX(-100%);} to{transform:translateX(100%);} }

/* =================== TOASTS =================== */
.toast-wrap {
  position:fixed; bottom:90px; left:50%; transform:translateX(-50%);

.toast.error { border-color:var(--red); }

@keyframes toastOut { to{opacity:0; transform:translateY(-10px);} }

/* =================== PREMIUM SCREEN =================== */

/* =================== UTIL =================== */

  if (!d) return null;
  const bd = new Date(d); if (isNaN(bd)) return null;
  const now = new Date();
  let a = now.getFullYear() - bd.getFullYear();
  const m = now.getMonth() - bd.getMonth();
  if (m < 0 || (m === 0 && now.getDate() < bd.getDate())) a--;

  try { return JSON.parse(localStorage.getItem(streakKey()) || '{"count":0,"lastDate":""}'); }
  catch { return { count:0, lastDate:'' }; }
}
function bumpStreak() {
  const today = new Date().toISOString().slice(0,10);
  const yest = new Date(Date.now() - 86400000).toISOString().slice(0,10);
  const s = getStreak();
  if (s.lastDate === today) return s;
  if (s.lastDate === yest) s.count = (s.count||0) + 1;
  else s.count = 1;
  s.lastDate = today;
  localStorage.setItem(streakKey(), JSON.stringify(s));
  return s;
}

  const s = getStreak();
  const today = new Date().toISOString().slice(0,10);
  const yest = new Date(Date.now() - 86400000).toISOString().slice(0,10);
  if (s.lastDate !== today && s.lastDate !== yest) return 0;
  return s.count || 0;
}

// ===================================================================
// HANDLERS
// ===================================================================

function attachHandlers() {
  // ---- auth ----
  const form = $('#authForm');
  if (form) {
    $('#toggleAuth')?.addEventListener('click', () => { state.authMode = state.authMode==='login'?'signup':'login'; render(); });
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = $('#authEmail').value.trim();
      const pw = $('#authPw').value;
      if (!email || pw.length < 6) { showToast('מלא אימייל וסיסמה (לפחות 6)', 'error'); return; }
      const btn = $('#authBtn'); btn.disabled = true; btn.textContent = '...';
      haptic();
      try {
        if (state.authMode === 'login') {
          const { error } = await sb.auth.signInWithPassword({ email, password:pw });
          if (error) throw error;
        } else {
          const { error } = await sb.auth.signUp({ email, password:pw });
          if (error) throw error;
        }
        // session change handler will continue
      } catch (err) {
        btn.disabled = false; btn.textContent = state.authMode==='login'?'🔓 התחבר':'✨ הירשם';
        showToast(err.message || 'משהו השתבש', 'error');
      }
    });
  }

  // ---- onboarding intro ----
  if ($('#introNext')) {
    $('#introNext').addEventListener('click', () => {
      haptic();
      if (state.onboardIntroIdx < INTRO_SLIDES.length - 1) {
        state.onboardIntroIdx++;
      } else {
        localStorage.setItem('mll2_intro_done', '1');
        state.screen = state.profile?.birth_date && state.user?.user_metadata?.full_name ? 'main' : 'onboardProfile';
      }
      render();
    });
    $('#introSkip')?.addEventListener('click', () => {
      localStorage.setItem('mll2_intro_done', '1');
      state.screen = state.profile?.birth_date && state.user?.user_metadata?.full_name ? 'main' : 'onboardProfile';
      render();
    });
  }

  // ---- onboarding profile ----
  if ($('#onbSubmit')) {
    if (state.user?.user_metadata?.full_name) $('#onbName').value = state.user.user_metadata.full_name;
    if (state.profile?.birth_date) $('#onbBirth').value = state.profile.birth_date;
    if (state.profile?.gender) $('#onbGender').value = state.profile.gender;
    if (state.profile?.usage_purpose) $('#onbPurpose').value = state.profile.usage_purpose;
    $('#onbSubmit').addEventListener('click', async () => {
      const full_name = $('#onbName').value.trim();
      const birth_date = $('#onbBirth').value;
      const gender = $('#onbGender').value;
      const usage_purpose = $('#onbPurpose').value;
      if (!full_name || !birth_date || !gender || !usage_purpose) { showToast('מלא את כל השדות', 'error'); return; }
      const age = calcAge(birth_date);
      if (age < 13 || age > 120) { showToast('תאריך לידה לא תקין', 'error'); return; }
      const btn = $('#onbSubmit'); btn.disabled = true;
      haptic();
      try {
        const { data: updated } = await sb.auth.updateUser({ data: { full_name } });
        if (updated?.user) state.user = updated.user;
        await saveProfile({ birth_date, gender, usage_purpose });
        state.screen = 'main';
        render();
      } catch (err) {
        btn.disabled = false;
        showToast(err.message || 'שגיאה', 'error');
      }
    });
  }

  // ---- top bar ----
  $('#topSettings')?.addEventListener('click', () => { haptic(); state.navTab='settings'; render(); });
  $('#streakChip')?.addEventListener('click', () => {
    haptic();
    const s = currentStreak();
    showToast(`🔥 רצף יומי של ${s} ימים! המשך כך!`, 'success');
  });

  // ---- bottom nav ----
  $$('.nav-item').forEach(el => el.addEventListener('click', () => {
    haptic();
    state.navTab = el.dataset.tab;
    render();
  }));

  // ---- promo banner ----
  $('#promoBanner')?.addEventListener('click', () => { haptic(); state.navTab='premium'; render(); });

  // ---- mode tabs ----
  $$('.mode-tab').forEach(el => el.addEventListener('click', () => {
    haptic();
    const m = el.dataset.mode;
    const limits = getLimits();
    if (m === 'opener' && !limits.hasOpener) { state.navTab='premium'; render(); showToast('"פתיחה" זמין רק ב-Pro', 'error'); return; }
    if (m === 'phrase' && !limits.hasPhrase) { state.navTab='premium'; render(); showToast('"ניסוח" זמין ב-Plus ו-Pro', 'error'); return; }
    state.appMode = m;
    render();
  }));

  // ---- crush picker ----
  $('#crushPicker')?.addEventListener('click', () => { haptic(); state.navTab='profiles'; render(); });

  // ---- profile cards ----
  $$('.crush-card').forEach(el => el.addEventListener('click', (e) => {
    if (e.target.closest('.actions')) return;
    haptic();
    state.selectedCrushId = el.dataset.id;
    state.navTab = 'home';
    render();
    showToast(`נבחר: ${state.crushes.find(c=>c.id===el.dataset.id)?.name}`, 'success');
  }));
  $$('.edit-crush').forEach(el => el.addEventListener('click', (e) => {
    e.stopPropagation(); haptic();
    const c = state.crushes.find(x => x.id === el.dataset.id);
    openCrushSheet(c);
  }));
  $$('.del-crush').forEach(el => el.addEventListener('click', async (e) => {
    e.stopPropagation(); haptic(20);
    const c = state.crushes.find(x => x.id === el.dataset.id);
    if (!confirm(`למחוק את ${c.name}?`)) return;
    try { await deleteCrush(el.dataset.id); render(); showToast('נמחק', 'success'); }
    catch (err) { showToast(err.message, 'error'); }
  }));
  $('#newCrushBtn')?.addEventListener('click', () => {
    haptic();
    const limit = getLimits().crushProfiles;
    if (state.crushes.length >= limit) { state.navTab='premium'; render(); showToast(`מגבלה: ${limit} פרופילים. שדרג להרחיב.`, 'error'); return; }
    openCrushSheet(null);
  });

  // ---- style chips ----
  $$('.style-chip').forEach(el => el.addEventListener('click', () => {
    haptic();
    state.selectedStyle = el.dataset.style;
    $$('.style-chip').forEach(c => c.classList.remove('active'));
    el.classList.add('active');
  }));

  // ---- attach image ----
  $('#attachBtn')?.addEventListener('click', () => {
    haptic();
    state.inputMode = 'image';
    $('#fileIn').click();
  });
  $('#fileIn')?.addEventListener('change', (e) => {
    const f = e.target.files[0];
    if (!f) return;
    if (!f.type.startsWith('image/')) { showToast('קובץ תמונה בלבד', 'error'); return; }
    if (f.size > 5*1024*1024) { showToast('עד 5MB', 'error'); return; }
    const r = new FileReader();
    r.onload = (ev) => {
      const url = ev.target.result;
      state.imageBase64 = url.split(',')[1];
      state.imageMediaType = f.type;
      render();
    };
    r.readAsDataURL(f);
  });
  $('#rmImg')?.addEventListener('click', () => { haptic(); state.imageBase64=null; state.imageMediaType=null; state.inputMode='text'; render(); });
  $('#backToText')?.addEventListener('click', () => { haptic(); state.inputMode='text'; render(); });

  // ---- generate ----
  $('#genBtn')?.addEventListener('click', handleGenerate);

  // ---- premium ----
  $$('#cycleToggle button').forEach(b => b.addEventListener('click', () => {
    haptic(); state.billingCycle = b.dataset.cycle; render();
  }));
  $$('[data-buy]').forEach(b => b.addEventListener('click', () => handleBuy(b.dataset.buy, b)));

  // ---- settings ----
  $('#editProfile')?.addEventListener('click', () => { haptic(); openProfileSheet(); });
  $('#goPremium')?.addEventListener('click', () => { haptic(); state.navTab='premium'; render(); });
  $('#signOut')?.addEventListener('click', async () => {
    if (!confirm('להתנתק?')) return;
    haptic(20);
    await sb.auth.signOut();
    state.user=null; state.profile=null; state.crushes=[];
    state.screen='auth';
    render();
  });
}

// ===================================================================
// GENERATE FLOW
// ===================================================================

async function handleGenerate() {
  if (state.busy) return;
  if (remainingToday() === 0) {
    haptic(30);
    state.navTab='premium'; render();
    showToast('הגעת למגבלת היצירות היומית', 'error');
    return;
  }
  haptic();
  state.busy = true;
  const btn = $('#genBtn');
  const results = $('#resultsWrap');
  const load = $('#loadZone');
  const loadText = $('#loadText');
  if (results) results.innerHTML = '';
  if (load) load.classList.add('active');
  if (loadText) loadText.textContent = state.appMode==='opener' ? 'בונה פתיחות מנצחות...' : state.appMode==='phrase' ? 'מנסח לך אופציות...' : state.inputMode==='image' ? 'קורא את הצילום...' : 'חושב על תשובות מבריקות...';
  if (btn) btn.disabled = true;

  try {
    const answers = await generateAnswers();
    if (answers) {
      bumpUsage();
      const s = bumpStreak();
      renderResults(answers);
      results?.scrollIntoView({ behavior:'smooth', block:'start' });
      haptic(15);
      if (s.count === 1) showToast('🔥 התחלת רצף חדש!', 'success');
    }
  } catch (err) {
    showToast(err.message || 'משהו השתבש', 'error');
    haptic(30);
  } finally {
    state.busy = false;
    if (load) load.classList.remove('active');
    if (btn) btn.disabled = false;
  }
}

function renderResults(answers) {
  const style = STYLES.find(s => s.id === state.selectedStyle);
  const wrap = $('#resultsWrap');
  if (!wrap) return;
  wrap.innerHTML = `
    <div class="results-header">
      <div class="results-title">✨ ${answers.length} ${state.appMode==='opener'?'פתיחות':state.appMode==='phrase'?'ניסוחים':'תשובות'}</div>
      <div class="results-meta">${style?style.emoji+' '+style.label:''}</div>
    </div>
    ${answers.map((a, i) => `
      <div class="bubble">
        <div class="bubble-tag">#${i+1}</div>
        <div class="bubble-text">${esc(a)}</div>
        <div class="bubble-actions">
          <button class="action-btn copy-act" data-txt="${esc(a)}">📋 העתק</button>
          <button class="action-btn wa wa-act" data-txt="${esc(a)}">💚 WhatsApp</button>
          <button class="action-btn share-act" data-txt="${esc(a)}">📤 שתף</button>
        </div>
      </div>
    `).join('')}
  `;

  $$('.copy-act', wrap).forEach(b => b.addEventListener('click', async () => {
    haptic();
    const txt = b.dataset.txt;
    try { await navigator.clipboard.writeText(txt); }
    catch {
      const ta = document.createElement('textarea'); ta.value = txt;
      document.body.appendChild(ta); ta.select(); document.execCommand('copy'); ta.remove();
    }
    const orig = b.innerHTML;
    b.classList.add('copied'); b.innerHTML = '✓ הועתק!';
    setTimeout(() => { b.classList.remove('copied'); b.innerHTML = orig; }, 1800);
  }));

  $$('.wa-act', wrap).forEach(b => b.addEventListener('click', () => {
    haptic();
    const txt = b.dataset.txt;
    window.open(`https://wa.me/?text=${encodeURIComponent(txt)}`, '_blank');
  }));

  $$('.share-act', wrap).forEach(b => b.addEventListener('click', async () => {
    haptic();
    const txt = b.dataset.txt;
    if (navigator.share) {
      try { await navigator.share({ text: txt }); }
      catch {}
    } else {
      try { await navigator.clipboard.writeText(txt); showToast('הועתק (שיתוף לא נתמך בדפדפן)', 'success'); }
      catch { showToast('לא ניתן לשתף', 'error'); }
    }
  }));
}

// ===================================================================
// BUY FLOW
// ===================================================================

async function handleBuy(targetTier, btn) {
  haptic();
  if (targetTier === 'free') {
    if (!confirm('לחזור לתוכנית חינם?')) return;
    btn.disabled = true; btn.textContent = '...';
    try {
      const { data: updated } = await sb.auth.updateUser({ data: { subscription_tier:'free', subscription_expiry:null, subscription_cycle:null } });
      if (updated?.user) state.user = updated.user;
      render(); showToast('חזרת לתוכנית חינם', 'success');
    } catch (err) { btn.disabled=false; showToast(err.message, 'error'); }
    return;
  }

  const linkKey = `${targetTier}_${state.billingCycle}`;
  const stripeUrl = CONFIG.STRIPE_LINKS[linkKey];

  if (!stripeUrl) {
    const trialed = !!state.user.user_metadata?.trial_used;
    const trialMsg = trialed ? '' : `\n\n🎁 כולל ${TRIAL_DAYS} ימי ניסיון חינם`;
    if (!confirm(`התשלום עדיין לא הוגדר.\nלהפעיל מנוי הדגמה?${trialMsg}`)) return;
    btn.disabled = true; btn.textContent = '...';
    try {
      const days = state.billingCycle === 'yearly' ? 365 : 30;
      const tDays = trialed ? 0 : TRIAL_DAYS;
      const expiry = new Date(Date.now() + (days+tDays)*86400000).toISOString();
      const trial_end = tDays > 0 ? new Date(Date.now() + tDays*86400000).toISOString() : null;
      const { data: updated } = await sb.auth.updateUser({
        data: { subscription_tier:targetTier, subscription_expiry:expiry, subscription_cycle:state.billingCycle, trial_end, trial_used:true }
      });
      if (updated?.user) state.user = updated.user;
      render();
      showToast(tDays>0 ? `🎉 התחיל ניסיון של ${TRIAL_DAYS} ימים!` : `🎉 ברוך הבא ל-${TIER_LABELS[targetTier].name}!`, 'success');
      haptic(25);
    } catch (err) { btn.disabled=false; showToast(err.message, 'error'); }
    return;
  }

  btn.disabled = true; btn.textContent = 'פותח תשלום...';
  const p = new URLSearchParams({ prefilled_email: state.user.email || '', client_reference_id: state.user.id });
  window.location.href = `${stripeUrl}?${p.toString()}`;
}

// ===================================================================
// SHEETS (modals)
// ===================================================================

function openSheet(html) {
  const root = $('#sheets');
  root.innerHTML = `<div class="sheet-bg" id="sheetBg">
    <div class="sheet">
      <div class="sheet-handle"></div>
      <button class="sheet-close" onclick="closeSheet()">✕</button>
      ${html}
    </div>
  </div>`;
  setTimeout(() => $('#sheetBg').classList.add('open'), 10);
  $('#sheetBg').addEventListener('click', (e) => { if (e.target.id === 'sheetBg') closeSheet(); });
}
window.closeSheet = function() {
  const bg = $('#sheetBg'); if (!bg) return;
  bg.classList.remove('open');
  setTimeout(() => $('#sheets').innerHTML = '', 350);
};

function openCrushSheet(crush) {
  const c = crush || {};
  const isNew = !crush;
  openSheet(`
    <div class="sheet-title">${isNew?'פרופיל חדש':'עריכת פרופיל'}</div>
    <div class="sheet-sub">ככל שתיתן יותר מידע, התשובות מדויקות יותר</div>
    <div class="input-row">
      <label class="label">שם *</label>
      <input class="input" id="crName" value="${esc(c.name||'')}" placeholder="איך קוראים לה/לו" />
    </div>
    <div class="input-row">
      <label class="label">גיל</label>
      <input class="input" id="crAge" type="number" min="13" max="120" value="${c.age||''}" placeholder="גיל משוער" />
    </div>
    <div class="input-row">
      <label class="label">מגדר</label>
      <select class="input" id="crGender">
        <option value="">לא צוין</option>
        <option value="female" ${c.gender==='female'?'selected':''}>נקבה</option>
        <option value="male" ${c.gender==='male'?'selected':''}>זכר</option>
        <option value="other" ${c.gender==='other'?'selected':''}>אחר</option>
      </select>
    </div>
    <div class="input-row">
      <label class="label">איך הכרתם</label>
      <input class="input" id="crHowMet" value="${esc(c.how_we_met||'')}" placeholder="טינדר, חברים משותפים, עבודה..." />
    </div>
    <div class="input-row">
      <label class="label">מצב הקשר</label>
      <input class="input" id="crStatus" value="${esc(c.relationship_status||'')}" placeholder="זרים, חברים, מדברים, יוצאים..." />
    </div>
    <div class="input-row">
      <label class="label">קצת עליו/עליה</label>
      <textarea class="input" id="crAbout" placeholder="עיסוק, תחביבים, אופי...">${esc(c.about||'')}</textarea>
    </div>
    <div class="input-row">
      <label class="label">רגעים והערות</label>
      <textarea class="input" id="crNotes" placeholder="דברים שצריך לזכור על הצ'אט...">${esc(c.notes||'')}</textarea>
    </div>
    <button class="btn btn-primary" id="crSave">💾 שמור</button>
  `);
  $('#crSave').addEventListener('click', async () => {
    const name = $('#crName').value.trim();
    if (!name) { showToast('שם חובה', 'error'); return; }
    haptic();
    $('#crSave').disabled = true;
    try {
      await saveCrush({
        id: c.id,
        name,
        age: parseInt($('#crAge').value) || null,
        gender: $('#crGender').value || null,
        how_we_met: $('#crHowMet').value.trim() || null,
        relationship_status: $('#crStatus').value.trim() || null,
        about: $('#crAbout').value.trim() || null,
        notes: $('#crNotes').value.trim() || null,
      });
      closeSheet();
      render();
      showToast(isNew?'פרופיל נוצר':'שמור', 'success');
    } catch (err) {
      $('#crSave').disabled = false;
      showToast(err.message || 'שגיאה', 'error');
    }
  });
}

function openProfileSheet() {
  openSheet(`
    <div class="sheet-title">עריכת פרופיל</div>
    <div class="sheet-sub">הפרטים שלך - לא של מי שמדבר איתך</div>
    <div class="input-row">
      <label class="label">👤 השם שלך</label>
      <input class="input" id="pfName" value="${esc(state.user?.user_metadata?.full_name||'')}" />
    </div>
    <div class="input-row">
      <label class="label">📅 תאריך לידה</label>
      <input class="input" id="pfBirth" type="date" value="${state.profile?.birth_date||''}" />
    </div>
    <div class="input-row">
      <label class="label">⚧ מגדר</label>
      <select class="input" id="pfGender">
        <option value="male" ${state.profile?.gender==='male'?'selected':''}>זכר</option>
        <option value="female" ${state.profile?.gender==='female'?'selected':''}>נקבה</option>
        <option value="other" ${state.profile?.gender==='other'?'selected':''}>אחר</option>
      </select>
    </div>
    <div class="input-row">
      <label class="label">🎯 מטרת השימוש</label>
      <select class="input" id="pfPurpose">
        <option value="dating" ${state.profile?.usage_purpose==='dating'?'selected':''}>דייטים</option>
        <option value="relationship" ${state.profile?.usage_purpose==='relationship'?'selected':''}>זוגיות</option>
        <option value="friends" ${state.profile?.usage_purpose==='friends'?'selected':''}>חברים</option>
        <option value="work" ${state.profile?.usage_purpose==='work'?'selected':''}>עבודה</option>
        <option value="family" ${state.profile?.usage_purpose==='family'?'selected':''}>משפחה</option>
        <option value="other" ${state.profile?.usage_purpose==='other'?'selected':''}>אחר</option>
      </select>
    </div>
    <button class="btn btn-primary" id="pfSave">💾 שמור</button>
  `);
  $('#pfSave').addEventListener('click', async () => {
    const name = $('#pfName').value.trim();
    const birth = $('#pfBirth').value;
    const gender = $('#pfGender').value;
    const purpose = $('#pfPurpose').value;
    if (!name || !birth || !gender || !purpose) { showToast('מלא הכל', 'error'); return; }
    haptic(); $('#pfSave').disabled = true;
    try {
      const { data: u } = await sb.auth.updateUser({ data: { full_name: name } });
      if (u?.user) state.user = u.user;
      await saveProfile({ birth_date: birth, gender, usage_purpose: purpose });
      closeSheet(); render(); showToast('פרופיל עודכן', 'success');
    } catch (err) { $('#pfSave').disabled=false; showToast(err.message, 'error'); }
  });
}

// ===================================================================
// STRIPE RETURN HANDLER
// ===================================================================

async function handleStripeReturn() {
  const p = new URLSearchParams(location.search);
  const status = p.get('stripe_status');
  if (!status || !state.user) return;
  history.replaceState({}, '', location.pathname + location.hash);
  if (status === 'success') {
    try { const { data: { user } } = await sb.auth.getUser(); if (user) state.user = user; } catch {}
    const tier = p.get('tier'), cycle = p.get('cycle');
    if (tier && (tier==='plus'||tier==='pro') && getTier()==='free') {
      const days = cycle === 'yearly' ? 365 : 30;
      const expiry = new Date(Date.now() + days*86400000).toISOString();
      try {
        const { data: updated } = await sb.auth.updateUser({
          data: { subscription_tier:tier, subscription_expiry:expiry, subscription_cycle:cycle, pending_stripe_verification:true }
        });
        if (updated?.user) state.user = updated.user;
      } catch {}
    }
    setTimeout(() => showToast('🎉 התשלום התקבל! המנוי שלך פעיל.', 'success'), 400);
    haptic(40);
    render();
  } else if (status === 'cancel') {
    setTimeout(() => showToast('התשלום בוטל', 'error'), 300);
  }
}

// ===================================================================
// INIT
// ===================================================================

async function init() {
  render(); // boot screen

  const { data: { session } } = await sb.auth.getSession();
  if (session?.user) {
    state.user = session.user;
    await loadProfile();
    await loadCrushes();
    afterAuth();
  } else {
    state.screen = 'auth';
    render();
  }
  await handleStripeReturn();

  sb.auth.onAuthStateChange(async (event, sess) => {
    if (event === 'SIGNED_OUT') {
      state.user=null; state.profile=null; state.crushes=[];
      state.screen='auth'; render();
    } else if (event === 'SIGNED_IN' && sess) {
      state.user = sess.user;
      await loadProfile();
      await loadCrushes();
      afterAuth();
    }
  });

  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  }
}

function afterAuth() {
  const hasProfile = state.user?.user_metadata?.full_name && state.profile?.birth_date && state.profile?.gender && state.profile?.usage_purpose;
  const introDone = localStorage.getItem('mll2_intro_done') === '1';
  if (!introDone) { state.screen = 'onboardIntro'; state.onboardIntroIdx = 0; }
  else if (!hasProfile) state.screen = 'onboardProfile';
  else state.screen = 'main';
  render();
}

// Global paste handler for image
document.addEventListener('paste', (e) => {
  if (!state.user || state.screen !== 'main' || state.appMode !== 'reply') return;
  const items = e.clipboardData?.items;
  if (!items) return;
  for (const it of items) {
    if (it.type.startsWith('image/')) {
      const f = it.getAsFile();
      if (f) {
        const r = new FileReader();
        r.onload = (ev) => {
          const url = ev.target.result;
          state.imageBase64 = url.split(',')[1];
          state.imageMediaType = f.type;
          state.inputMode = 'image';
          render();
          showToast('תמונה צורפה ✓', 'success');
          haptic();
        };
        r.readAsDataURL(f);
        e.preventDefault();
        break;
      }
    }
  }
});

init();
</script>
