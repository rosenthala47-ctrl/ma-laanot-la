<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<meta name="theme-color" content="#07050f" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, max-age=0" />
<meta http-equiv="Pragma" content="no-cache" />
<meta http-equiv="Expires" content="0" />
<title>מה לענות לה? 💬</title>
<link rel="manifest" href="manifest.json" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700;800;900&display=swap" rel="stylesheet" />
<style>
/* =================== DESIGN TOKENS =================== */
:root {
  --bg: #07050f;
  --bg-2: #0d0820;
  --surface: rgba(255,255,255,0.04);
  --surface-2: rgba(255,255,255,0.07);
  --surface-3: rgba(255,255,255,0.10);
  --stroke: rgba(255,255,255,0.08);
  --stroke-2: rgba(255,255,255,0.16);
  --pink: #ff2e93;
  --purple: #9d4eff;
  --cyan: #00e5ff;
  --yellow: #ffd93d;
  --orange: #ff9a3d;
  --green: #00ffa3;
  --red: #ff4566;
  --text: #ffffff;
  --text-2: #c5b8e8;
  --text-3: #8678a8;
  --text-4: #4f4570;
  --grad-1: linear-gradient(135deg, #ff2e93 0%, #9d4eff 50%, #00e5ff 100%);
  --grad-2: linear-gradient(135deg, #9d4eff 0%, #00e5ff 100%);
  --grad-3: linear-gradient(135deg, #ff2e93 0%, #ff9a3d 100%);
  --grad-fire: linear-gradient(135deg, #ff9a3d 0%, #ff2e93 100%);
  --shadow-glow: 0 8px 32px rgba(157, 78, 255, 0.4);
  --shadow-card: 0 12px 40px rgba(0,0,0,0.5);
  --spring: cubic-bezier(0.34, 1.56, 0.64, 1);
  --ease: cubic-bezier(0.4, 0, 0.2, 1);
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}

* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; -webkit-touch-callout:none; }
*:focus-visible { outline:2px solid var(--cyan); outline-offset:2px; border-radius:8px; }

html, body {
  height:100%; overscroll-behavior:none; overflow:hidden;
  background:var(--bg); color:var(--text);
  font-family:'Heebo',-apple-system,BlinkMacSystemFont,sans-serif;
  font-weight:500; -webkit-font-smoothing:antialiased; -moz-osx-font-smoothing:grayscale;
}

button, input, textarea, select { font-family:inherit; color:inherit; }

/* =================== AMBIENT BACKGROUND =================== */
.bg-glow {
  position:fixed; inset:0; z-index:0; pointer-events:none; overflow:hidden;
}
.bg-glow::before, .bg-glow::after {
  content:''; position:absolute; border-radius:50%; filter:blur(120px); opacity:0.35;
}
.bg-glow::before {
  width:500px; height:500px; background:var(--pink);
  top:-200px; right:-150px;
  animation:floatA 18s ease-in-out infinite;
}
.bg-glow::after {
  width:450px; height:450px; background:var(--purple);
  bottom:-150px; left:-150px;
  animation:floatB 22s ease-in-out infinite;
}
@keyframes floatA { 0%,100%{transform:translate(0,0) scale(1);} 50%{transform:translate(-80px,120px) scale(1.15);} }
@keyframes floatB { 0%,100%{transform:translate(0,0) scale(1);} 50%{transform:translate(100px,-80px) scale(1.2);} }

/* =================== APP SHELL =================== */
#app {
  position:fixed; inset:0; z-index:1; display:flex; flex-direction:column;
  max-width:560px; margin:0 auto;
  padding-top:var(--safe-top);
  padding-bottom:var(--safe-bottom);
}

.screen {
  position:absolute; inset:0; padding-top:calc(var(--safe-top) + 0px);
  padding-bottom:calc(var(--safe-bottom) + 0px);
  display:flex; flex-direction:column;
  opacity:0; pointer-events:none;
  transition: opacity 0.35s var(--ease), transform 0.4s var(--ease);
  transform:translateX(20px);
}
.screen.active { opacity:1; pointer-events:auto; transform:translateX(0); z-index:2; }
.screen.exit-left { transform:translateX(-20px); }
.screen-scroll {
  flex:1; overflow-y:auto; overflow-x:hidden;
  -webkit-overflow-scrolling:touch;
  padding:0 20px;
  padding-bottom:120px;
  scrollbar-width:none;
}
.screen-scroll::-webkit-scrollbar { display:none; }

/* =================== TOP BAR =================== */
.topbar {
  display:flex; align-items:center; justify-content:space-between;
  padding:14px 20px 10px; gap:10px;
  position:sticky; top:0; z-index:10;
  background:linear-gradient(to bottom, var(--bg) 60%, transparent);
  backdrop-filter:blur(20px);
}
.topbar-title {
  font-size:22px; font-weight:900; letter-spacing:-0.5px;
  background:var(--grad-1); -webkit-background-clip:text; background-clip:text;
  -webkit-text-fill-color:transparent;
}
.topbar-actions { display:flex; gap:8px; align-items:center; }

.streak-chip {
  display:inline-flex; align-items:center; gap:4px;
  background:linear-gradient(135deg, rgba(255,154,61,0.15), rgba(255,46,147,0.15));
  border:1px solid rgba(255,154,61,0.3);
  border-radius:999px; padding:6px 12px;
  font-weight:800; font-size:14px;
  color:#ffce8c;
  cursor:pointer; transition:all 0.2s var(--ease);
}
.streak-chip:active { transform:scale(0.94); }
.streak-chip .fire { animation:fireFlicker 1.6s ease-in-out infinite; display:inline-block; }
@keyframes fireFlicker {
  0%,100% { transform:scale(1) rotate(-3deg); filter:drop-shadow(0 0 4px rgba(255,154,61,0.6)); }
  50% { transform:scale(1.15) rotate(3deg); filter:drop-shadow(0 0 8px rgba(255,46,147,0.8)); }
}

.icon-btn {
  width:40px; height:40px; border-radius:50%;
  background:var(--surface); border:1px solid var(--stroke);
  display:flex; align-items:center; justify-content:center;
  font-size:18px; cursor:pointer; transition:all 0.2s var(--ease);
}
.icon-btn:active { transform:scale(0.9); background:var(--surface-2); }

/* =================== BOTTOM NAV =================== */
.bottom-nav {
  position:absolute; bottom:0; left:0; right:0;
  padding:8px 12px calc(8px + var(--safe-bottom));
  background:rgba(7,5,15,0.85); backdrop-filter:blur(24px);
  border-top:1px solid var(--stroke);
  display:grid; grid-template-columns:repeat(5, 1fr);
  z-index:50;
}
.nav-item {
  display:flex; flex-direction:column; align-items:center; gap:3px;
  padding:8px 4px; cursor:pointer; border-radius:14px;
  color:var(--text-3); transition:all 0.25s var(--ease);
  position:relative;
}
.nav-item:active { transform:scale(0.92); }
.nav-item .nav-icon { font-size:22px; transition:transform 0.3s var(--spring); }
.nav-item .nav-label { font-size:10px; font-weight:700; }
.nav-item.active { color:var(--text); }
.nav-item.active .nav-icon { transform:translateY(-3px) scale(1.15); }
.nav-item.active::before {
  content:''; position:absolute; top:0; left:50%; transform:translateX(-50%);
  width:30px; height:3px; border-radius:0 0 4px 4px;
  background:var(--grad-1);
}

/* =================== AUTH / SPLASH =================== */
.splash {
  flex:1; display:flex; flex-direction:column; justify-content:center; align-items:center;
  padding:40px 32px; text-align:center;
}
.splash-logo {
  font-size:80px; margin-bottom:18px;
  animation:logoFloat 4s ease-in-out infinite;
  filter:drop-shadow(0 0 40px rgba(255,46,147,0.5));
}
@keyframes logoFloat { 0%,100%{transform:translateY(0) rotate(-3deg);} 50%{transform:translateY(-12px) rotate(3deg);} }

.splash-title {
  font-size:42px; font-weight:900; letter-spacing:-1px; line-height:1.05;
  background:var(--grad-1); -webkit-background-clip:text; background-clip:text;
  -webkit-text-fill-color:transparent;
  margin-bottom:10px;
  animation:fadeUp 0.7s var(--ease) both 0.1s;
}
.splash-subtitle {
  font-size:16px; color:var(--text-2); font-weight:500;
  margin-bottom:40px; line-height:1.5;
  animation:fadeUp 0.7s var(--ease) both 0.2s;
}
@keyframes fadeUp { from{opacity:0; transform:translateY(20px);} to{opacity:1; transform:translateY(0);} }

.auth-form { width:100%; max-width:380px; animation:fadeUp 0.7s var(--ease) both 0.3s; }

.input {
  width:100%; background:var(--surface-2); border:1.5px solid var(--stroke);
  border-radius:18px; padding:16px 18px;
  font-size:16px; font-weight:500;
  transition:all 0.25s var(--ease); direction:rtl;
}
.input::placeholder { color:var(--text-3); }
.input:focus {
  outline:none; border-color:var(--pink);
  background:var(--surface-3);
  box-shadow:0 0 0 4px rgba(255,46,147,0.15);
}
.input-row { margin-bottom:12px; }
.input-row:last-child { margin-bottom:0; }

textarea.input { min-height:90px; resize:none; line-height:1.5; }

select.input {
  appearance:none;
  background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='14' height='14' viewBox='0 0 24 24' fill='none' stroke='%23c5b8e8' stroke-width='2.5'><polyline points='6 9 12 15 18 9'/></svg>");
  background-repeat:no-repeat; background-position:left 18px center;
  padding-left:46px;
}

.label { display:block; font-size:13px; font-weight:700; color:var(--text-2); margin-bottom:8px; }

/* =================== BUTTONS =================== */
.btn {
  width:100%; border:none; border-radius:18px; padding:16px 18px;
  font-weight:800; font-size:16px; cursor:pointer;
  display:flex; align-items:center; justify-content:center; gap:8px;
  transition:transform 0.15s var(--ease), box-shadow 0.25s var(--ease), opacity 0.2s;
  user-select:none;
}
.btn:active { transform:scale(0.97); }
.btn:disabled { opacity:0.55; cursor:not-allowed; }

.btn-primary {
  background:var(--grad-1); color:white;
  box-shadow:0 8px 28px rgba(255,46,147,0.4);
  font-size:17px; padding:18px;
}
.btn-primary:active { box-shadow:0 4px 14px rgba(255,46,147,0.5); }

.btn-secondary {
  background:var(--surface-2); color:var(--text);
  border:1.5px solid var(--stroke-2);
}

.btn-ghost {
  background:transparent; color:var(--text-2);
  font-weight:600; padding:12px;
}

.btn-danger {
  background:rgba(255,69,102,0.12); color:var(--red);
  border:1.5px solid rgba(255,69,102,0.3);
}

.btn-row { display:flex; gap:10px; }
.btn-row > * { flex:1; }

/* Toggle for login/signup */
.auth-toggle {
  text-align:center; margin-top:18px;
  color:var(--text-2); font-size:14px;
}
.auth-toggle a { color:var(--pink); font-weight:800; cursor:pointer; }

/* =================== CARDS / SECTIONS =================== */
.card {
  background:var(--surface);
  border:1px solid var(--stroke);
  border-radius:22px; padding:18px;
  backdrop-filter:blur(20px);
  margin-bottom:14px;
}
.card-glass {
  background:var(--surface-2);
  border:1px solid var(--stroke-2);
}
.card-title {
  font-size:13px; font-weight:800; color:var(--text-2);
  margin-bottom:12px; letter-spacing:0.3px;
  display:flex; align-items:center; gap:6px;
}
.card-title-big { font-size:18px; color:var(--text); }

.section-title {
  font-size:22px; font-weight:900; letter-spacing:-0.5px;
  margin:8px 0 14px;
}

/* =================== WELCOME =================== */
.greet-card {
  padding:22px;
  background:linear-gradient(135deg, rgba(157,78,255,0.12), rgba(0,229,255,0.08));
  border:1px solid var(--stroke-2);
  border-radius:24px;
  margin-bottom:16px;
}
.greet-hello {
  font-size:13px; color:var(--text-2); font-weight:600; margin-bottom:4px;
}
.greet-name {
  font-size:26px; font-weight:900; letter-spacing:-0.5px;
  background:var(--grad-1); -webkit-background-clip:text; background-clip:text;
  -webkit-text-fill-color:transparent; line-height:1.1; margin-bottom:6px;
}
.greet-sub { font-size:14px; color:var(--text-2); }
.tier-pill {
  display:inline-flex; align-items:center; gap:5px;
  margin-top:10px;
  font-size:11px; font-weight:800; padding:5px 10px; border-radius:999px;
  background:var(--surface-3); border:1px solid var(--stroke);
  color:var(--text-2);
}
.tier-pill.plus {
  background:linear-gradient(135deg, rgba(157,78,255,0.25), rgba(0,229,255,0.2));
  border-color:var(--purple); color:var(--cyan);
}
.tier-pill.pro {
  background:var(--grad-1); border-color:transparent; color:white;
  box-shadow:0 4px 14px rgba(255,46,147,0.4);
}

/* =================== MODE TABS =================== */
.mode-tabs {
  display:grid; grid-template-columns:repeat(4, 1fr); gap:5px;
  background:var(--surface); border:1px solid var(--stroke);
  border-radius:18px; padding:5px; margin-bottom:16px;
}
.mode-tab {
  background:transparent; border:none; color:var(--text-3);
  padding:9px 3px; border-radius:14px; cursor:pointer;
  font-size:12px; font-weight:700;
  display:flex; flex-direction:column; align-items:center; gap:2px;
  transition:all 0.3s var(--ease); position:relative;
}
.mode-tab .mode-emoji { font-size:17px; }
.mode-tab:active { transform:scale(0.95); }
.mode-tab.active {
  background:var(--grad-1); color:white;
  box-shadow:0 4px 16px rgba(255,46,147,0.35);
  transform:scale(1.02);
}
.mode-tab.active .mode-emoji { animation:tabActivePop 0.4s var(--spring) both; }
@keyframes tabActivePop {
  0% { transform:scale(0.8); }
  60% { transform:scale(1.25); }
  100% { transform:scale(1); }
}
.mode-tab.locked { opacity:0.55; }
.mode-tab .lock {
  position:absolute; top:3px; left:4px; font-size:11px;
  background:var(--yellow); color:#3a2a00; border-radius:6px;
  padding:1px 4px; font-weight:800;
}

/* =================== CRUSH SELECTOR =================== */
.crush-row {
  display:flex; align-items:center; gap:12px;
  background:var(--surface); border:1px solid var(--stroke);
  border-radius:18px; padding:12px 14px; margin-bottom:14px;
  cursor:pointer; transition:all 0.2s var(--ease);
}
.crush-row:active { transform:scale(0.98); background:var(--surface-2); }
.crush-avatar {
  width:44px; height:44px; border-radius:50%;
  background:var(--grad-1); color:white;
  display:flex; align-items:center; justify-content:center;
  font-weight:900; font-size:18px; flex-shrink:0;
  box-shadow:0 4px 14px rgba(255,46,147,0.3);
}
.crush-info { flex:1; min-width:0; }
.crush-name { font-weight:800; font-size:15px; }
.crush-meta { font-size:12px; color:var(--text-3); margin-top:2px; }
.crush-chevron { color:var(--text-3); font-size:18px; }

/* =================== STYLE CHIPS =================== */
.styles-scroll {
  display:flex; gap:8px; overflow-x:auto; padding:4px 0 6px;
  scrollbar-width:none; margin:0 -20px; padding-left:20px; padding-right:20px;
  scroll-snap-type:x mandatory;
}
.styles-scroll::-webkit-scrollbar { display:none; }
.style-chip {
  flex:0 0 auto; scroll-snap-align:start;
  background:var(--surface); border:1.5px solid var(--stroke);
  border-radius:14px; padding:10px 14px;
  display:flex; align-items:center; gap:6px;
  font-weight:700; font-size:13px; color:var(--text-2);
  cursor:pointer; transition:all 0.25s var(--ease);
  white-space:nowrap;
}
.style-chip:active { transform:scale(0.94); }
.style-chip .se { font-size:18px; }
.style-chip.locked { opacity:0.5; cursor:pointer; }
.style-chip.locked::after { content:'🔒'; font-size:11px; margin-right:2px; }
.style-chip.active {
  background:var(--grad-1); color:white; border-color:transparent;
  box-shadow:0 6px 18px rgba(255,46,147,0.4);
  animation:chipSelect 0.35s var(--spring);
  transform:scale(1.04);
}

/* =================== INPUT AREA (chat-style) =================== */
.input-bubble {
  background:var(--surface-2); border:1.5px solid var(--stroke);
  border-radius:22px; padding:14px 16px;
  transition:all 0.25s var(--ease);
  position:relative;
}
.input-bubble:focus-within {
  border-color:var(--pink);
  background:var(--surface-3);
  box-shadow:0 0 0 4px rgba(255,46,147,0.12);
}
.input-bubble textarea {
  width:100%; background:transparent; border:none;
  font-size:15px; resize:none; line-height:1.5;
  min-height:70px; outline:none; color:var(--text);
}
.input-bubble textarea::placeholder { color:var(--text-3); }

.input-actions {
  display:flex; gap:8px; margin-top:10px; align-items:center; justify-content:flex-end;
}
.input-action {
  background:var(--surface-3); border:1px solid var(--stroke);
  border-radius:12px; padding:8px 12px; font-size:13px; font-weight:700;
  color:var(--text-2); cursor:pointer; display:inline-flex; align-items:center; gap:5px;
  transition:all 0.2s var(--ease);
}
.input-action:active { transform:scale(0.94); }
.input-action.attached { color:var(--cyan); border-color:var(--cyan); }
.input-action.locked { color:var(--text-3); opacity:0.7; }

/* Hidden file input */
.file-hidden { position:absolute; opacity:0; width:0; height:0; }

.image-preview {
  margin-top:10px; border-radius:16px; overflow:hidden;
  position:relative; border:1.5px solid var(--stroke);
}
.image-preview img { width:100%; display:block; max-height:300px; object-fit:contain; background:var(--bg-2); }
.image-preview .remove-img {
  position:absolute; top:8px; left:8px;
  background:rgba(0,0,0,0.7); border:none; border-radius:50%;
  width:28px; height:28px; color:white; cursor:pointer; backdrop-filter:blur(8px);
}

/* =================== GENERATE BUTTON =================== */
.fab-generate {
  width:100%; padding:18px 20px;
  background:var(--grad-1); color:white;
  border:none; border-radius:22px;
  font-size:17px; font-weight:900;
  display:flex; align-items:center; justify-content:center; gap:10px;
  cursor:pointer;
  box-shadow:0 10px 30px rgba(255,46,147,0.45);
  transition:transform 0.15s var(--ease), box-shadow 0.25s var(--ease);
  margin-top:14px;
  position:relative; overflow:hidden;
}
.fab-generate:active { transform:scale(0.97); }
.fab-generate:disabled { opacity:0.55; }
.fab-generate::after {
  content:''; position:absolute; top:0; left:-100%; width:60%; height:100%;
  background:linear-gradient(90deg, transparent, rgba(255,255,255,0.25), transparent);
  animation:shine 3.5s ease-in-out infinite;
}
@keyframes shine { 0%,100% { left:-100%; } 50% { left:100%; } }
.fab-generate .sparkle {
  display:inline-block; animation:sparkleSpin 2s linear infinite;
}
@keyframes sparkleSpin { 0%,100%{transform:rotate(0) scale(1);} 50%{transform:rotate(180deg) scale(1.2);} }

.usage-line {
  font-size:12px; color:var(--text-3);
  text-align:center; margin-top:10px;
}
.usage-line.low { color:var(--yellow); font-weight:700; }
.usage-line.empty { color:var(--red); font-weight:700; }

/* =================== RESULTS (chat bubbles) =================== */
.results-wrap { margin-top:24px; }
.results-header {
  display:flex; align-items:center; justify-content:space-between;
  margin-bottom:14px;
}
.results-title {
  font-size:18px; font-weight:900;
}
.results-meta {
  font-size:11px; color:var(--text-3); background:var(--surface);
  border:1px solid var(--stroke); padding:5px 10px; border-radius:999px;
  font-weight:700;
}

.bubble {
  background:var(--surface-2); border:1px solid var(--stroke-2);
  border-radius:22px 22px 22px 6px;
  padding:16px 18px; margin-bottom:12px;
  position:relative;
  animation:bubbleIn 0.5s var(--spring) both;
  backdrop-filter:blur(20px);
}
.bubble:nth-child(1) { animation-delay:0.05s; }
.bubble:nth-child(2) { animation-delay:0.18s; }
.bubble:nth-child(3) { animation-delay:0.31s; }
@keyframes bubbleIn {
  from { opacity:0; transform:translateY(20px) scale(0.95); }
  to { opacity:1; transform:translateY(0) scale(1); }
}

.bubble-tag {
  position:absolute; top:-10px; right:14px;
  background:var(--grad-1); color:white;
  font-size:11px; font-weight:900; padding:4px 10px; border-radius:999px;
  letter-spacing:0.3px;
}
.bubble-text {
  font-size:16px; line-height:1.6; color:var(--text);
  white-space:pre-wrap; word-wrap:break-word;
  margin-bottom:14px; margin-top:4px;
}
.bubble-actions {
  display:flex; gap:8px; flex-wrap:wrap;
}
.action-btn {
  background:var(--surface-3); border:1px solid var(--stroke);
  border-radius:12px; padding:9px 14px;
  font-size:13px; font-weight:700; color:var(--text-2);
  cursor:pointer; display:inline-flex; align-items:center; gap:6px;
  transition:all 0.25s var(--ease);
}
.action-btn:active { transform:scale(0.94); }
.action-btn.copied {
  background:var(--green); color:#003822; border-color:var(--green);
}
.action-btn.wa {
  background:#25D366; color:#003814; border-color:#25D366;
}
.action-btn.wa:active { background:#1bb858; }

/* Rating row inside reply bubble */
.rating-row {
  display:flex; align-items:center; gap:8px;
  margin-top:10px; padding-top:10px;
  border-top:1px dashed var(--stroke);
}
.rating-prompt {
  font-size:12px; color:var(--text-3); margin-left:auto;
}
.rate-btn {
  background:var(--surface-3); border:1px solid var(--stroke);
  width:36px; height:36px; border-radius:10px;
  font-size:18px; cursor:pointer; padding:0;
  display:flex; align-items:center; justify-content:center;
  transition:all 0.2s var(--ease);
}
.rate-btn:active { transform:scale(0.9); }
.rate-btn.active {
  background:var(--grad-1); border-color:transparent;
  box-shadow:0 4px 12px rgba(255,46,147,0.35);
}

/* Check-message result panel */
.check-result {
  display:flex; flex-direction:column; gap:16px;
}
.check-score {
  background:var(--surface); border:1px solid var(--stroke);
  border-radius:20px; padding:22px 18px; text-align:center;
  border-top:4px solid var(--clr);
}
.check-emoji { font-size:36px; margin-bottom:6px; }
.check-num {
  font-size:48px; font-weight:900; color:var(--clr);
  line-height:1; margin-bottom:8px;
}
.check-of { font-size:22px; color:var(--text-3); font-weight:700; }
.check-verdict {
  font-size:15px; font-weight:600; color:var(--text-1);
}
.check-section {
  background:var(--surface); border:1px solid var(--stroke);
  border-radius:16px; padding:14px 16px;
}
.check-section-title {
  font-size:14px; font-weight:800; color:var(--text-1);
  margin-bottom:10px;
}
.check-list {
  list-style:none; padding:0; margin:0;
  display:flex; flex-direction:column; gap:8px;
}
.check-list li {
  background:var(--surface-3); border-radius:10px;
  padding:9px 12px; font-size:13px; line-height:1.5;
  border-right:3px solid var(--stroke);
}
.check-list.red li { border-right-color:#ff4d6d; }
.check-list.green li { border-right-color:#2ece8a; }
.check-rewrite {
  background:linear-gradient(135deg, rgba(255,46,147,0.10), rgba(85,79,255,0.10));
  border:1px solid var(--stroke); border-radius:12px;
  padding:14px; font-size:15px; line-height:1.6;
  color:var(--text-1); font-weight:600;
}

/* Polish: chip selection bounce */
@keyframes chipSelect {
  0% { transform:scale(1); }
  50% { transform:scale(1.08); }
  100% { transform:scale(1); }
}

/* Invite / Viral card */
.invite-card {
  background:linear-gradient(135deg, rgba(255,46,147,0.10), rgba(85,79,255,0.10));
  border:1px solid rgba(255,46,147,0.25);
  text-align:center;
  position:relative; overflow:hidden;
}
.invite-card::before {
  content:'✨'; position:absolute; top:-12px; right:-8px;
  font-size:40px; opacity:0.25;
  animation:sparkleFloat 6s ease-in-out infinite;
}
@keyframes sparkleFloat {
  0%,100% { transform:translate(0,0) rotate(0deg); }
  50% { transform:translate(-8px,12px) rotate(20deg); }
}
.invite-emoji { font-size:36px; margin-bottom:6px; }
.invite-title {
  font-weight:800; font-size:16px; color:var(--text-1);
  margin-bottom:6px;
}
.invite-sub {
  font-size:13px; color:var(--text-3);
  margin-bottom:12px; line-height:1.5;
}
.invite-link-row {
  display:flex; gap:6px; align-items:stretch;
}
.invite-link {
  flex:1; background:var(--surface); border:1px solid var(--stroke);
  border-radius:10px; padding:9px 12px; font-size:12px;
  color:var(--text-2); direction:ltr; text-align:left;
  font-family:monospace; min-width:0;
}
.invite-copy {
  background:var(--surface-3); border:1px solid var(--stroke);
  border-radius:10px; padding:0 14px; font-size:13px; font-weight:700;
  color:var(--text-1); cursor:pointer;
  transition:all 0.2s var(--ease);
}
.invite-copy:active { transform:scale(0.94); }
.invite-copy.copied {
  background:var(--green); color:#003822; border-color:var(--green);
}

/* Confetti burst (used on high check score) */
.confetti-burst {
  position:fixed; pointer-events:none;
  inset:0; overflow:hidden; z-index:9999;
}
.confetti-piece {
  position:absolute; top:30%; left:50%;
  width:10px; height:10px; border-radius:2px;
  animation:confettiFall 1.6s ease-out forwards;
}
@keyframes confettiFall {
  0% {
    opacity:1; transform:translate(0,0) rotate(0deg);
  }
  100% {
    opacity:0;
    transform:translate(var(--dx, 0px), 60vh) rotate(var(--rot, 540deg));
  }
}

/* Crush history timeline */
.history-list {
  display:flex; flex-direction:column; gap:10px;
  max-height:55vh; overflow-y:auto;
  padding:4px 2px;
}
.history-item {
  background:var(--surface-3); border:1px solid var(--stroke);
  border-radius:14px; padding:12px;
}
.history-head {
  display:flex; align-items:center; gap:8px;
  margin-bottom:8px; font-size:12px;
}
.history-mode { font-weight:800; color:var(--text-1); }
.history-when { color:var(--text-3); flex:1; }
.history-del {
  background:transparent; border:1px solid var(--stroke);
  border-radius:8px; padding:4px 8px; cursor:pointer;
  font-size:12px; color:var(--text-3);
}
.history-del:active { transform:scale(0.92); }
.history-input {
  font-size:13px; color:var(--text-2); line-height:1.5;
  padding:8px 10px; background:var(--surface);
  border-radius:8px; margin-bottom:8px;
}
.history-out { display:flex; flex-direction:column; gap:5px; }
.history-style-tag {
  font-size:11px; color:var(--text-3); font-weight:700;
  margin-bottom:2px;
}
.history-answer {
  font-size:13px; color:var(--text-1); line-height:1.5;
  padding:6px 10px; background:var(--surface);
  border-radius:8px; border-right:2px solid var(--purple);
}

/* =================== LOADING =================== */
.loading-zone {
  display:none; padding:36px 20px; text-align:center;
}
.loading-zone.active { display:block; animation:fadeUp 0.4s var(--ease); }
.loader-dots {
  display:inline-flex; gap:8px; margin-bottom:14px;
}
.loader-dots span {
  width:12px; height:12px; border-radius:50%;
  background:var(--pink);
  animation:dotBounce 1.4s ease-in-out infinite;
}
.loader-dots span:nth-child(2) { background:var(--purple); animation-delay:0.16s; }
.loader-dots span:nth-child(3) { background:var(--cyan); animation-delay:0.32s; }
@keyframes dotBounce {
  0%,80%,100% { transform:scale(0.6); opacity:0.5; }
  40% { transform:scale(1.2); opacity:1; }
}
.loader-text { color:var(--text-2); font-size:14px; font-weight:600; }

/* Shimmer skeleton bubbles */
.skel-bubble {
  background:var(--surface); border:1px solid var(--stroke);
  border-radius:22px 22px 22px 6px;
  padding:16px 18px; margin-bottom:12px;
  height:80px; position:relative; overflow:hidden;
}
.skel-bubble::after {
  content:''; position:absolute; inset:0;
  background:linear-gradient(90deg, transparent, rgba(255,255,255,0.06), transparent);
  animation:shimmer 1.6s linear infinite;
}
@keyframes shimmer { from{transform:translateX(-100%);} to{transform:translateX(100%);} }

/* =================== TOASTS =================== */
.toast-wrap {
  position:fixed; bottom:90px; left:50%; transform:translateX(-50%);
  z-index:100; pointer-events:none;
  display:flex; flex-direction:column; gap:8px;
}
.toast {
  background:rgba(7,5,15,0.95); backdrop-filter:blur(20px);
  border:1px solid var(--stroke-2); border-radius:16px;
  padding:12px 18px; font-size:14px; font-weight:600;
  color:var(--text); box-shadow:0 12px 32px rgba(0,0,0,0.5);
  display:flex; align-items:center; gap:8px;
  animation:toastIn 0.4s var(--spring), toastOut 0.4s var(--ease) 3.5s forwards;
  pointer-events:auto;
}
.toast.success { border-color:var(--green); }
.toast.error { border-color:var(--red); }
@keyframes toastIn { from{opacity:0; transform:translateY(20px);} to{opacity:1; transform:translateY(0);} }
@keyframes toastOut { to{opacity:0; transform:translateY(-10px);} }

/* =================== BOTTOM SHEET / MODAL =================== */
.sheet-bg {
  position:fixed; inset:0; z-index:200;
  background:rgba(0,0,0,0.7); backdrop-filter:blur(8px);
  opacity:0; pointer-events:none;
  transition:opacity 0.3s var(--ease);
}
.sheet-bg.open { opacity:1; pointer-events:auto; }
.sheet {
  position:absolute; bottom:0; left:50%; transform:translate(-50%, 100%);
  width:100%; max-width:560px;
  background:var(--bg-2);
  border-top:1px solid var(--stroke-2);
  border-radius:28px 28px 0 0;
  max-height:88vh; overflow-y:auto;
  transition:transform 0.4s var(--spring);
  padding:8px 20px 28px;
  padding-bottom:calc(28px + var(--safe-bottom));
  scrollbar-width:none;
}
.sheet::-webkit-scrollbar { display:none; }
.sheet-bg.open .sheet { transform:translate(-50%, 0); }
.sheet-handle {
  width:40px; height:4px; background:var(--stroke-2);
  border-radius:2px; margin:8px auto 18px; opacity:0.7;
}
.sheet-title { font-size:22px; font-weight:900; letter-spacing:-0.4px; margin-bottom:6px; }
.sheet-sub { font-size:14px; color:var(--text-2); margin-bottom:18px; }
.sheet-close {
  position:absolute; top:18px; left:20px;
  width:32px; height:32px; border-radius:50%;
  background:var(--surface-2); border:1px solid var(--stroke);
  color:var(--text); font-size:14px; cursor:pointer;
  display:flex; align-items:center; justify-content:center;
}

/* =================== ADMIN PANEL =================== */
.admin-card {
  background:linear-gradient(135deg, rgba(154,46,255,0.1), rgba(46,206,255,0.08));
  border:1px solid rgba(154,46,255,0.25);
  border-radius:18px; padding:14px; margin-bottom:10px;
}
.admin-card .at-title {
  font-weight:900; font-size:15px; margin-bottom:2px;
  display:flex; align-items:center; gap:8px;
}
.admin-card .at-sub { font-size:12px; color:var(--text-2); margin-bottom:10px; }
.admin-stats {
  display:grid; grid-template-columns:repeat(4, 1fr);
  gap:8px; margin-bottom:14px;
}
.admin-stat {
  background:var(--surface-2); border:1px solid var(--stroke);
  border-radius:12px; padding:10px 6px; text-align:center;
}
.admin-stat .v { font-size:20px; font-weight:900; line-height:1; }
.admin-stat .l { font-size:11px; color:var(--text-3); margin-top:4px; font-weight:600; }
.admin-stat.free .v { color:var(--text-2); }
.admin-stat.plus .v { color:#ffb547; }
.admin-stat.pro  .v { color:#2eceff; }
.admin-search {
  width:100%; background:var(--surface-2); border:1px solid var(--stroke);
  border-radius:12px; padding:10px 12px; color:var(--text);
  font-size:14px; margin-bottom:10px;
}
.admin-user {
  background:var(--surface); border:1px solid var(--stroke);
  border-radius:14px; padding:10px 12px; margin-bottom:8px;
  display:flex; align-items:center; gap:10px;
}
.admin-user .au-info { flex:1; min-width:0; }
.admin-user .au-email {
  font-weight:700; font-size:13px;
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
}
.admin-user .au-meta { font-size:11px; color:var(--text-3); margin-top:2px; }
.admin-user .au-tier {
  padding:3px 8px; border-radius:10px; font-size:11px; font-weight:800;
  white-space:nowrap;
}
.admin-user .au-tier.free { background:rgba(255,255,255,0.08); color:var(--text-2); }
.admin-user .au-tier.plus { background:rgba(255,181,71,0.15); color:#ffb547; }
.admin-user .au-tier.pro  { background:rgba(46,206,255,0.15); color:#2eceff; }
.admin-user .au-edit {
  background:var(--surface-2); border:1px solid var(--stroke);
  border-radius:10px; width:30px; height:30px; cursor:pointer;
  font-size:14px; color:var(--text);
}
.admin-tier-picker {
  display:grid; grid-template-columns:repeat(3, 1fr); gap:8px; margin:12px 0;
}
.admin-tier-picker button {
  padding:10px; border-radius:12px; font-size:13px; font-weight:800;
  background:var(--surface-2); border:1px solid var(--stroke); color:var(--text);
  cursor:pointer;
}
.admin-tier-picker button.active { background:var(--grad-1); border-color:transparent; color:white; }
.admin-cycle-picker { display:flex; gap:8px; margin-bottom:12px; }
.admin-cycle-picker button {
  flex:1; padding:8px; border-radius:10px; font-size:12px; font-weight:700;
  background:var(--surface-2); border:1px solid var(--stroke); color:var(--text);
  cursor:pointer;
}
.admin-cycle-picker button.active { background:var(--cyan); color:#003a44; border-color:transparent; }

/* =================== EMPTY STATES =================== */
.empty-state {
  text-align:center; padding:60px 20px;
  animation:fadeUp 0.5s var(--ease) both;
}
.empty-emoji {
  font-size:64px; margin-bottom:16px;
  animation:emptyFloat 4s ease-in-out infinite;
  display:inline-block;
}
@keyframes emptyFloat { 0%,100%{transform:translateY(0) rotate(0);} 50%{transform:translateY(-10px) rotate(5deg);} }
.empty-title { font-size:20px; font-weight:800; margin-bottom:6px; }
.empty-sub { font-size:14px; color:var(--text-2); margin-bottom:24px; line-height:1.5; }

/* =================== CRUSH LIST =================== */
.crush-card {
  background:var(--surface); border:1px solid var(--stroke);
  border-radius:20px; padding:14px;
  display:flex; align-items:center; gap:12px;
  margin-bottom:10px; transition:all 0.2s var(--ease);
  cursor:pointer;
}
.crush-card.selected {
  border-color:var(--pink);
  background:linear-gradient(135deg, rgba(255,46,147,0.08), rgba(157,78,255,0.05));
  box-shadow:0 4px 16px rgba(255,46,147,0.15);
}
.crush-card:active { transform:scale(0.98); }
.crush-card .actions { display:flex; gap:6px; }
.crush-card .actions button {
  background:var(--surface-2); border:1px solid var(--stroke);
  width:36px; height:36px; border-radius:12px;
  font-size:15px; cursor:pointer; color:var(--text);
}
.crush-card .actions button:active { transform:scale(0.9); }

/* =================== PREMIUM SCREEN =================== */
.premium-hero {
  text-align:center; padding:20px 0 28px;
}
.premium-emoji {
  font-size:72px; margin-bottom:12px;
  filter:drop-shadow(0 0 24px rgba(255,46,147,0.5));
  animation:premiumPulse 2.5s ease-in-out infinite;
}
@keyframes premiumPulse {
  0%,100% { transform:scale(1) rotate(-5deg); }
  50% { transform:scale(1.1) rotate(5deg); }
}
.premium-title {
  font-size:30px; font-weight:900; letter-spacing:-1px;
  background:var(--grad-1); -webkit-background-clip:text; background-clip:text;
  -webkit-text-fill-color:transparent;
  margin-bottom:6px;
}
.premium-sub { color:var(--text-2); font-size:14px; }

.cycle-toggle {
  display:grid; grid-template-columns:1fr 1fr;
  background:var(--surface); border:1px solid var(--stroke);
  border-radius:16px; padding:4px; margin:16px 0 20px;
}
.cycle-toggle button {
  background:transparent; border:none; padding:11px 8px;
  color:var(--text-3); font-size:13px; font-weight:800;
  border-radius:12px; cursor:pointer; transition:all 0.25s var(--ease);
  position:relative;
}
.cycle-toggle button.active {
  background:var(--grad-1); color:white;
  box-shadow:0 4px 14px rgba(255,46,147,0.35);
}
.save-tag {
  position:absolute; top:-9px; left:-4px;
  background:var(--yellow); color:#3a2700;
  font-size:10px; font-weight:900; padding:2px 7px; border-radius:8px;
}

.tier-card {
  background:var(--surface); border:1.5px solid var(--stroke);
  border-radius:22px; padding:20px; margin-bottom:14px;
  position:relative;
}
.tier-card.recommended {
  border-color:var(--pink);
  background:linear-gradient(135deg, rgba(255,46,147,0.08), rgba(157,78,255,0.05));
  box-shadow:0 10px 30px rgba(255,46,147,0.15);
}
.tier-card.current { border-color:var(--cyan); background:rgba(0,229,255,0.05); }
.tier-tag {
  position:absolute; top:-11px; right:16px;
  font-size:11px; font-weight:900; padding:5px 11px; border-radius:999px;
}
.tier-tag.popular { background:var(--grad-1); color:white; }
.tier-tag.now { background:var(--cyan); color:#003a44; }
.tier-name { font-size:20px; font-weight:900; margin-bottom:4px; }
.tier-price { font-size:32px; font-weight:900; line-height:1; }
.tier-price .ccy { font-size:18px; color:var(--text-3); }
.tier-price .per { font-size:14px; color:var(--text-3); font-weight:500; }
.tier-yearly-note { font-size:12px; color:var(--cyan); font-weight:700; margin-top:4px; }
.trial-tag {
  display:inline-block; margin-top:10px;
  background:var(--grad-fire); color:#3a2300;
  font-size:12px; font-weight:900; padding:5px 12px; border-radius:999px;
}
.tier-feats { list-style:none; margin:14px 0; padding:0; }
.tier-feats li {
  font-size:13px; color:var(--text-2); padding:6px 0;
  display:flex; align-items:flex-start; gap:8px; line-height:1.4;
}
.tier-feats li::before { content:'✓'; color:var(--green); font-weight:900; flex-shrink:0; }
.tier-feats li.off { color:var(--text-3); }
.tier-feats li.off::before { content:'✕'; color:var(--text-4); }

/* =================== ONBOARDING CAROUSEL =================== */
.onboard-carousel {
  flex:1; display:flex; flex-direction:column; padding:32px 28px 24px;
}
.onboard-slide {
  flex:1; display:flex; flex-direction:column; justify-content:center; align-items:center;
  text-align:center; gap:14px;
  animation:slideInRight 0.4s var(--ease);
}
@keyframes slideInRight { from{opacity:0; transform:translateX(20px);} to{opacity:1; transform:translateX(0);} }
.onboard-emoji { font-size:96px; filter:drop-shadow(0 0 30px rgba(255,46,147,0.4)); animation:logoFloat 4s ease-in-out infinite; }
.onboard-title { font-size:32px; font-weight:900; letter-spacing:-0.8px; line-height:1.15; }
.onboard-text { font-size:16px; color:var(--text-2); line-height:1.6; max-width:340px; }
.onboard-dots { display:flex; gap:8px; justify-content:center; margin:24px 0; }
.onboard-dots span {
  width:8px; height:8px; border-radius:50%;
  background:var(--stroke-2); transition:all 0.3s var(--ease);
}
.onboard-dots span.active { background:var(--pink); width:24px; }

/* =================== UTIL =================== */
.spacer { height:14px; }
.spacer-lg { height:24px; }
.text-center { text-align:center; }
.text-dim { color:var(--text-3); }
.muted-note { font-size:11px; color:var(--text-3); text-align:center; line-height:1.5; margin-top:14px; }
.toggle-switch { position:relative; display:inline-block; width:44px; height:26px; flex-shrink:0; }
.toggle-switch input { opacity:0; width:0; height:0; }
.toggle-track { position:absolute; inset:0; background:var(--stroke); border-radius:26px; transition:background 0.25s; cursor:pointer; }
.toggle-track::before { content:''; position:absolute; width:20px; height:20px; left:3px; top:3px; background:#fff; border-radius:50%; transition:transform 0.25s; }
.toggle-switch input:checked + .toggle-track { background:var(--pink); }
.toggle-switch input:checked + .toggle-track::before { transform:translateX(18px); }

/* =================== COACH =================== */
.coach-hero {
  text-align:center; padding:6px 4px 14px;
}
.coach-hero .coach-emoji {
  font-size:48px; margin-bottom:8px;
  filter:drop-shadow(0 0 30px rgba(154,46,255,0.45));
  animation:logoFloat 5s ease-in-out infinite;
}
.coach-hero .coach-title {
  font-size:22px; font-weight:900;
  background:var(--grad-2); -webkit-background-clip:text; background-clip:text; color:transparent;
}
.coach-hero .coach-sub {
  font-size:13px; color:var(--text-3); margin-top:4px;
}
.coach-textarea {
  width:100%; min-height:170px; resize:none;
  background:var(--surface); border:1.5px solid var(--stroke);
  border-radius:18px; padding:14px;
  font:inherit; color:var(--text); font-size:14px; line-height:1.55;
  direction:rtl; outline:none; transition:border-color 0.2s;
}
.coach-textarea:focus { border-color:var(--purple); }
.coach-textarea::placeholder { color:var(--text-3); }
.coach-actions { display:flex; gap:8px; margin-top:10px; }
.coach-analyze {
  flex:1; padding:16px; border:none; border-radius:18px;
  background:var(--grad-2); color:white; font-weight:900; font-size:15px;
  cursor:pointer; transition:transform 0.2s var(--spring);
  box-shadow:0 10px 30px rgba(154,46,255,0.4);
  display:flex; align-items:center; justify-content:center; gap:8px;
}
.coach-analyze:active { transform:scale(0.96); }
.coach-analyze:disabled { opacity:0.6; cursor:wait; }
.coach-emergency-btn {
  width:100%; padding:18px; border:none; border-radius:18px;
  background:linear-gradient(135deg, #ff2e93 0%, #ff5e1a 100%);
  color:white; font-weight:900; font-size:16px;
  cursor:pointer; transition:transform 0.2s var(--spring);
  box-shadow:0 14px 38px rgba(255,46,147,0.45);

const $ = (s, root=document) => root.querySelector(s);
const $$ = (s, root=document) => root.querySelectorAll(s);
const esc = (s) => { const d=document.createElement('div'); d.textContent = s ?? ''; return d.innerHTML; };
const haptic = (ms=10) => { try { if (localStorage.getItem('mll2_haptic') !== '0') navigator.vibrate?.(ms); } catch {} };

function showToast(msg, type='') {
  const wrap = $('#toasts');
  const t = document.createElement('div');
  t.className = 'toast ' + type;
  t.innerHTML = `<span>${type==='success'?'✓':type==='error'?'⚠️':'💬'}</span><span>${esc(msg)}</span>`;
  wrap.appendChild(t);
  setTimeout(() => t.remove(), 4200);
}

function calcAge(d) {
  if (!d) return null;
  const bd = new Date(d); if (isNaN(bd)) return null;
  const now = new Date();
  let a = now.getFullYear() - bd.getFullYear();
  const m = now.getMonth() - bd.getMonth();
  if (m < 0 || (m === 0 && now.getDate() < bd.getDate())) a--;
  return a;
}

// ---------- tier / usage ----------
function isAdmin() {
  const e = state.user?.email?.toLowerCase();
  return e && CONFIG.ADMIN_EMAILS.map(x=>x.toLowerCase()).includes(e);
}
function getTier() {
  if (isAdmin()) return 'pro';
  const meta = state.user?.user_metadata || {};
  const tier = meta.subscription_tier;
  const expiry = meta.subscription_expiry;
  if (tier === 'plus' || tier === 'pro') {
    if (!expiry || new Date(expiry) > new Date()) return tier;
  }
  return 'free';
}
function getLimits() { return TIER_LIMITS[getTier()]; }
function trialDaysLeft() {
  const e = state.user?.user_metadata?.trial_end;
  if (!e) return 0;
  const ms = new Date(e).getTime() - Date.now();
  return ms <= 0 ? 0 : Math.ceil(ms / 86400000);
}
function usageKey() { return `mll2_usage_${state.user?.id||'a'}_${new Date().toISOString().slice(0,10)}`; }
function getUsedToday() { return parseInt(localStorage.getItem(usageKey())||'0', 10); }
function bumpUsage() { localStorage.setItem(usageKey(), String(getUsedToday()+1)); }
function remainingToday() {
  const lim = getLimits().dailyGenerations;
  return lim === Infinity ? Infinity : Math.max(0, lim - getUsedToday());
}

// ---------- streak ----------
function streakKey() { return `mll2_streak_${state.user?.id||'a'}`; }
function getStreak() {
  try { return JSON.parse(localStorage.getItem(streakKey()) || '{"count":0,"lastDate":""}'); }
  catch { return { count:0, lastDate:'' }; }
}
function bumpStreak() {
  const today = new Date().toISOString().slice(0,10);
  const yest = new Date(Date.now() - 86400000).toISOString().slice(0,10);
  const s = getStreak();
  if (s.lastDate === today) return s;
  if (s.lastDate === yest) s.count = (s.count||0) + 1;
  else s.count = 1;
  s.lastDate = today;
  localStorage.setItem(streakKey(), JSON.stringify(s));
  return s;
}
function currentStreak() {
  const s = getStreak();
  const today = new Date().toISOString().slice(0,10);
  const yest = new Date(Date.now() - 86400000).toISOString().slice(0,10);
  if (s.lastDate !== today && s.lastDate !== yest) return 0;
  return s.count || 0;
}

// ---------- data ----------
async function loadProfile() {
  if (!state.user) return null;
  const { data } = await sb.from('profiles').select('*').eq('id', state.user.id).maybeSingle();
  state.profile = data;
  return data;
}
async function saveProfile(updates) {
  const { data, error } = await sb.from('profiles').upsert({ id: state.user.id, ...updates }, { onConflict:'id' }).select().single();
  if (error) throw error;
  state.profile = data;
  return data;
}
async function loadCrushes() {
  if (!state.user) return [];
  const { data } = await sb.from('crushes').select('*').eq('user_id', state.user.id).order('created_at', { ascending:false });
  state.crushes = data || [];
  return state.crushes;
}
async function saveCrush(c) {
  const payload = { ...c, user_id: state.user.id };
  let result;
  if (c.id) {
    const { data, error } = await sb.from('crushes').update(payload).eq('id', c.id).select().single();
    if (error) throw error; result = data;
  } else {
    const { data, error } = await sb.from('crushes').insert(payload).select().single();
    if (error) throw error; result = data;
  }
  await loadCrushes();
  return result;
}
async function deleteCrush(id) {
  await sb.from('crushes').delete().eq('id', id);
  if (state.selectedCrushId === id) state.selectedCrushId = null;
  await loadCrushes();
}

async function generateAnswers() {
  const crush = state.crushes.find(c => c.id === state.selectedCrushId) || null;
  const recentHistory = crush ? buildHistorySummary(crush.id, 3) : null;
  const base = {
    style: state.selectedStyle,
    situation: state.selectedSituation || 'auto',
    crush, crushId: state.selectedCrushId,
    userGender: state.profile?.gender || null,
    userName: state.user?.user_metadata?.full_name || null,
    recentHistory, // string of last 3 interactions, or null
  };
  let payload;
  if (state.appMode === 'opener') {
    payload = { ...base, mode:'opener', relationshipLevel:'stranger', context: $('#openerCtx')?.value.trim() || '' };
  } else if (state.appMode === 'phrase') {
    const intent = $('#phraseInput')?.value.trim();
    if (!intent) { showToast('כתוב מה אתה רוצה להגיד', 'error'); return null; }
    payload = { ...base, mode:'phrase', intent };
  } else if (state.appMode === 'check') {
    const text = $('#checkInput')?.value.trim();
    if (!text) { showToast('הדבק את ההודעה לבדיקה', 'error'); return null; }
    payload = { ...base, mode:'check', text };
  } else if (state.inputMode === 'image') {
    if (!state.imageBase64) { showToast('צרף תמונה קודם', 'error'); return null; }
    payload = { ...base, mode:'image', imageBase64:state.imageBase64, imageMediaType:state.imageMediaType };
  } else {
    const text = $('#msgInput')?.value.trim();
    if (!text) { showToast('הדבק את ההודעה שקיבלת', 'error'); return null; }
    payload = { ...base, mode:'text', text };
  }
  console.log('[reply-source] requesting from Claude backend, mode=' + payload.mode + ', situation=' + payload.situation + ', style=' + payload.style);
  const r = await fetch(`${CONFIG.SUPABASE_URL}/functions/v1/chat-replies`, {
    method:'POST',
    headers:{ 'Content-Type':'application/json', 'apikey':CONFIG.SUPABASE_ANON_KEY, 'Authorization':`Bearer ${CONFIG.SUPABASE_ANON_KEY}` },
    body: JSON.stringify(payload)
  });
  if (!r.ok) {
    let m = `שגיאה (${r.status})`;
    try { const j = await r.json(); if (j.error) m += `: ${j.error}`; } catch {}
    console.error('[reply-source] backend error:', m);
    throw new Error(m);
  }
  const d = await r.json();
  // Check mode returns a different shape: { score, verdict, redFlags, strengths, rewrite }
  if (payload.mode === 'check') {
    if (typeof d.score !== 'number') throw new Error('תשובה לא תקינה');
    console.log('[reply-source] ✓ got check result from Claude');
    return { __check: true, ...d };
  }
  if (!Array.isArray(d.answers)) throw new Error('תשובה לא תקינה');
  console.log('[reply-source] ✓ got ' + d.answers.length + ' replies from Claude (Anthropic API)');
  return d.answers;
}

function render() {

  try {
    if (state.screen === 'boot') {
      html = renderBoot();
    } else if (state.screen === 'auth') {
      html = renderAuth();
    } else if (state.screen === 'onboardIntro') {
      html = renderOnboardIntro();

      html = renderOnboardProfile();
    } else if (state.screen === 'paywall') {
      html = renderPaywallOnboarding();
    } else {
      html = renderMain();
    }
  } catch (e) {
    console.error('Render error:', e);
    try { showToast('שגיאה: ' + (e.message || e), 'error'); } catch {}
    html = `<div class="screen active" style="padding:20px;color:#fff;">
      <h2 style="color:#ff2e93;">שגיאת תצוגה</h2>
      <pre style="white-space:pre-wrap;font-size:11px;background:rgba(0,0,0,0.5);padding:10px;border-radius:8px;color:#ffaaaa;">${(e.stack||e.message||e)+''}</pre>

    </div>`;
  }
  root.innerHTML = html;
  // mark active
  setTimeout(() => $$('.screen', root).forEach(s => s.classList.add('active')), 10);
  try { attachHandlers(); } catch (e) { console.error('attachHandlers error:', e); try { showToast('שגיאת חיבור: ' + (e.message||e), 'error'); } catch {} }
}

// ---- Cloud sync (Wave 5) — best-effort, falls back to localStorage silently ----
async function cloudSaveInteraction(crushId, interaction) {
  if (!state.user?.id || !crushId || !sb) return;
  try {
    await sb.from('crush_interactions').insert({
      crush_id: crushId,
      user_id: state.user.id,
      mode: interaction.mode || null,
      style: interaction.style || null,
      situation: interaction.situation || null,
      input: interaction.input || null,
      output: interaction.output || null,
      check_score: interaction.checkScore ?? null,
      check_verdict: interaction.checkVerdict || null,
    });
  } catch (e) { console.warn('[cloud] save interaction failed:', e?.message); }
}

async function cloudLoadAllInteractions() {
  if (!state.user?.id || !sb) return {};
  try {
    const { data, error } = await sb.from('crush_interactions')
      .select('*').eq('user_id', state.user.id)
      .order('created_at', { ascending: false }).limit(500);
    if (error) throw error;
    const byCrush = {};
    (data || []).forEach(row => {
      if (!byCrush[row.crush_id]) byCrush[row.crush_id] = [];
      byCrush[row.crush_id].push({
        mode: row.mode,
        style: row.style,
        situation: row.situation,
        input: row.input,
        output: row.output,
        checkScore: row.check_score,
        checkVerdict: row.check_verdict,
        ts: new Date(row.created_at).getTime(),
        cloudId: row.id,
      });
    });
    return byCrush;
  } catch (e) { console.warn('[cloud] load interactions failed:', e?.message); return {}; }
}

async function cloudDeleteInteraction(crushId, ts) {
  if (!state.user?.id || !sb) return;
  try {
    // find by ts → created_at; we store cloudId locally too if available
    const local = getCrushInteractions(crushId).find(i => i.ts === ts);
    if (local?.cloudId) {
      await sb.from('crush_interactions').delete().eq('id', local.cloudId);
    }
  } catch (e) { console.warn('[cloud] delete interaction failed:', e?.message); }
}

async function cloudClearCrushHistory(crushId) {
  if (!state.user?.id || !sb || !crushId) return;
  try { await sb.from('crush_interactions').delete().eq('crush_id', crushId).eq('user_id', state.user.id); }
  catch (e) { console.warn('[cloud] clear failed:', e?.message); }
}

async function cloudSaveRating(key, rate) {
  if (!state.user?.id || !sb) return;
  try {
    await sb.from('reply_ratings').upsert({
      user_id: state.user.id,
      rating_key: key,
      rating: rate,
      updated_at: new Date().toISOString(),
    }, { onConflict: 'user_id,rating_key' });
  } catch (e) { console.warn('[cloud] save rating failed:', e?.message); }
}

async function cloudLoadAllRatings() {
  if (!state.user?.id || !sb) return {};
  try {
    const { data, error } = await sb.from('reply_ratings')
      .select('rating_key, rating').eq('user_id', state.user.id);
    if (error) throw error;
    const map = {};
    (data || []).forEach(r => { map[r.rating_key] = r.rating; });
    return map;
  } catch (e) { console.warn('[cloud] load ratings failed:', e?.message); return {}; }
}

// Pull cloud data into localStorage on app boot/login (cloud is source of truth)
async function pullCloudData() {
  if (!state.user?.id) return;
  try {
    const [cloudHist, cloudRatings] = await Promise.all([
      cloudLoadAllInteractions(),
      cloudLoadAllRatings(),
    ]);
    // Replace local crush history with cloud (cloud is canonical)
    if (cloudHist && Object.keys(cloudHist).length > 0) {
      localStorage.setItem(`mll2_crush_history_${state.user.id}`, JSON.stringify(cloudHist));
    }
    // Merge ratings: cloud wins
    if (cloudRatings && Object.keys(cloudRatings).length > 0) {
      const local = (function() { try { return JSON.parse(localStorage.getItem('replyRatings')||'{}'); } catch { return {}; } })();
      const merged = { ...local, ...cloudRatings };
      localStorage.setItem('replyRatings', JSON.stringify(merged));
    }
    console.log('[cloud] sync complete');
  } catch (e) { console.warn('[cloud] pull failed:', e?.message); }
}

// ---- Per-crush conversation history (Wave 3 memory) ----
function getCrushHistoryAll() {
  if (!state.user?.id) return {};
  try { return JSON.parse(localStorage.getItem(`mll2_crush_history_${state.user.id}`) || '{}'); }
  catch { return {}; }
}
function getCrushInteractions(crushId) {
  if (!crushId) return [];
  const all = getCrushHistoryAll();
  return all[crushId] || [];
}
function saveCrushInteraction(crushId, interaction) {
  if (!state.user?.id || !crushId) return;
  try {
    const key = `mll2_crush_history_${state.user.id}`;
    const all = getCrushHistoryAll();
    if (!all[crushId]) all[crushId] = [];
    const entry = { ...interaction, ts: Date.now() };
    all[crushId].unshift(entry);
    all[crushId] = all[crushId].slice(0, 30); // keep last 30 per crush
    localStorage.setItem(key, JSON.stringify(all));
    // fire-and-forget cloud sync
    cloudSaveInteraction(crushId, entry);
  } catch {}
}
function deleteCrushInteraction(crushId, ts) {
  if (!state.user?.id || !crushId) return;
  try {
    const key = `mll2_crush_history_${state.user.id}`;
    const all = getCrushHistoryAll();
    if (!all[crushId]) return;
    cloudDeleteInteraction(crushId, ts); // before we strip the cloudId locally
    all[crushId] = all[crushId].filter(i => i.ts !== ts);
    localStorage.setItem(key, JSON.stringify(all));
  } catch {}
}
function clearCrushHistory(crushId) {
  if (!state.user?.id || !crushId) return;
  try {
    const key = `mll2_crush_history_${state.user.id}`;
    const all = getCrushHistoryAll();
    delete all[crushId];
    localStorage.setItem(key, JSON.stringify(all));
    cloudClearCrushHistory(crushId);
  } catch {}
}
// Build short context string from recent interactions for prompt injection
function buildHistorySummary(crushId, maxItems = 3) {
  const items = getCrushInteractions(crushId).slice(0, maxItems);
  if (!items.length) return null;
  // Reverse to chronological (oldest first) for narrative flow
  const chrono = items.slice().reverse();
  return chrono.map((i, idx) => {
    const when = formatRelTime(i.ts);
    const modeLabel = { reply: 'הוא ענה לה', opener: 'הוא פתח שיחה', phrase: 'הוא ניסח משהו', check: 'הוא בדק טיוטה' }[i.mode] || i.mode;
    const input = (i.input || '').slice(0, 80);
    const chosen = i.picked || (Array.isArray(i.output) ? i.output[0] : '') || '';
    return `${idx+1}. (${when}) ${modeLabel} בסגנון "${i.style||'?'}"${input?` · קלט: "${input}"`:''}${chosen?` · התשובה הסופית: "${chosen.slice(0, 100)}"`:''}`;
  }).join('\n');
}
function formatRelTime(ts) {
  const diff = Date.now() - ts;
  const m = Math.floor(diff/60000), h = Math.floor(diff/3600000), d = Math.floor(diff/86400000);
  if (d > 0) return `לפני ${d} ימים`;
  if (h > 0) return `לפני ${h} שעות`;
  if (m > 0) return `לפני ${m} דק'`;
  return 'עכשיו';
}

// ---- Polish: confetti burst ----
function confettiBurst() {
  const wrap = document.createElement('div');
  wrap.className = 'confetti-burst';
  const colors = ['#ff2e93', '#554fff', '#2eceff', '#2ece8a', '#ffb547', '#ff6b9d'];
  for (let i = 0; i < 30; i++) {
    const piece = document.createElement('div');
    piece.className = 'confetti-piece';
    piece.style.background = colors[i % colors.length];
    piece.style.setProperty('--dx', (Math.random() * 600 - 300) + 'px');
    piece.style.setProperty('--rot', (Math.random() * 1080 - 540) + 'deg');
    piece.style.animationDelay = (Math.random() * 0.2) + 's';
    wrap.appendChild(piece);
  }
  document.body.appendChild(wrap);
  setTimeout(() => wrap.remove(), 2000);
}

// ---- Viral / Invite helpers ----
function buildInviteUrl() {
  const base = (location.origin + location.pathname).replace(/\/+$/, '');
  const ref = state.user?.id ? `?ref=${state.user.id}` : '';
  return base + '/' + ref;
}
function captureReferralFromUrl() {
  try {
    const u = new URL(location.href);
    const ref = u.searchParams.get('ref');
    if (ref && !localStorage.getItem('mll2_referred_by')) {
      localStorage.setItem('mll2_referred_by', ref);
      // Clean URL so it doesn't persist visually
      u.searchParams.delete('ref');
      history.replaceState(null, '', u.pathname + (u.search ? '?'+u.searchParams.toString() : '') + u.hash);
      setTimeout(() => showToast('🎁 הוזמנת על ידי חבר! קוד הופעל.', 'success'), 800);
    }
  } catch {}
}

// ===================================================================
// HANDLERS
// ===================================================================

function attachHandlers() {
  // ---- auth ----
  const form = $('#authForm');
  if (form) {
    $('#toggleAuth')?.addEventListener('click', () => { state.authMode = state.authMode==='login'?'signup':'login'; render(); });
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = $('#authEmail').value.trim();
      const pw = $('#authPw').value;
      if (!email || pw.length < 6) { showToast('מלא אימייל וסיסמה (לפחות 6)', 'error'); return; }
      const btn = $('#authBtn'); btn.disabled = true; btn.textContent = '...';
      haptic();
      try {
        if (state.authMode === 'login') {
          const { error } = await sb.auth.signInWithPassword({ email, password:pw });
          if (error) throw error;
        } else {
          const { error } = await sb.auth.signUp({ email, password:pw });
          if (error) throw error;
        }
        // session change handler will continue
      } catch (err) {
        btn.disabled = false; btn.textContent = state.authMode==='login'?'🔓 התחבר':'✨ הירשם';
        showToast(err.message || 'משהו השתבש', 'error');
      }
    });
  }

  // ---- onboarding intro ----
  if ($('#introNext')) {
    $('#introNext').addEventListener('click', () => {
      haptic();
      if (state.onboardIntroIdx < INTRO_SLIDES.length - 1) {
        state.onboardIntroIdx++;
      } else {
        localStorage.setItem('mll2_intro_done', '1');
        state.screen = state.profile?.birth_date && state.user?.user_metadata?.full_name ? 'main' : 'onboardProfile';
      }
      render();
    });
    $('#introSkip')?.addEventListener('click', () => {
      localStorage.setItem('mll2_intro_done', '1');
      state.screen = state.profile?.birth_date && state.user?.user_metadata?.full_name ? 'main' : 'onboardProfile';
      render();
    });
  }

  // ---- paywall onboarding ----
  $('#pwOnbStart')?.addEventListener('click', () => {
    haptic();
    if (state.user?.id) localStorage.setItem(`mll2_paywall_shown_${state.user.id}`, '1');
    state.screen = 'main';
    state.navTab = 'premium';
    render();
  });
  $('#pwOnbSkip')?.addEventListener('click', () => {
    haptic();
    if (state.user?.id) localStorage.setItem(`mll2_paywall_shown_${state.user.id}`, '1');
    state.screen = 'main';
    state.navTab = 'home';
    render();
  });

  // ---- onboarding profile ----
  if ($('#onbSubmit')) {
    if (state.user?.user_metadata?.full_name) $('#onbName').value = state.user.user_metadata.full_name;
    if (state.profile?.birth_date) $('#onbBirth').value = state.profile.birth_date;
    if (state.profile?.gender) $('#onbGender').value = state.profile.gender;
    if (state.profile?.usage_purpose) $('#onbPurpose').value = state.profile.usage_purpose;
    $('#onbSubmit').addEventListener('click', async () => {
      const full_name = $('#onbName').value.trim();
      const birth_date = $('#onbBirth').value;
      const gender = $('#onbGender').value;
      const usage_purpose = $('#onbPurpose').value;
      if (!full_name || !birth_date || !gender || !usage_purpose) { showToast('מלא את כל השדות', 'error'); return; }
      const age = calcAge(birth_date);
      if (age < 13 || age > 120) { showToast('תאריך לידה לא תקין', 'error'); return; }
      const btn = $('#onbSubmit'); btn.disabled = true;
      haptic();
      try {
        const { data: updated } = await sb.auth.updateUser({ data: { full_name } });
        if (updated?.user) state.user = updated.user;
        await saveProfile({ birth_date, gender, usage_purpose });
        const paywallShown = localStorage.getItem(`mll2_paywall_shown_${state.user?.id}`) === '1';
        state.screen = (!paywallShown && getTier() === 'free') ? 'paywall' : 'main';
        render();
      } catch (err) {
        btn.disabled = false;
        showToast(err.message || 'שגיאה', 'error');
      }
    });
  }

  // ---- top bar ----
  $('#topSettings')?.addEventListener('click', () => { haptic(); state.navTab='settings'; render(); });
  $('#streakChip')?.addEventListener('click', () => {
    haptic();
    const s = currentStreak();
    showToast(`🔥 רצף יומי של ${s} ימים! המשך כך!`, 'success');
  });

  // ---- bottom nav ----
  $$('.nav-item').forEach(el => el.addEventListener('click', () => {
    haptic();
    state.navTab = el.dataset.tab;
    render();
  }));

  // ---- promo banner ----
  $('#promoBanner')?.addEventListener('click', () => { haptic(); state.navTab='premium'; render(); });

  // ---- mode tabs ----
  $$('.mode-tab').forEach(el => el.addEventListener('click', () => {
    haptic();

async function handleGenerate() {
  if (state.busy) return;
  if (remainingToday() === 0) {
    haptic(30);
    state.navTab='premium'; render();
    showToast('הגעת למגבלת היצירות היומית', 'error');
    return;
  }
  haptic();
  state.busy = true;
  const btn = $('#genBtn');
  const results = $('#resultsWrap');
  const load = $('#loadZone');
  const loadText = $('#loadText');
  if (results) results.innerHTML = '';
  if (load) load.classList.add('active');
  if (loadText) loadText.textContent = state.appMode==='opener' ? 'בונה פתיחות מנצחות...' : state.appMode==='phrase' ? 'מנסח לך אופציות...' : state.appMode==='check' ? 'בודק את ההודעה שלך...' : state.inputMode==='image' ? 'קורא את הצילום...' : 'חושב על תשובות מבריקות...';
  if (btn) btn.disabled = true;

  try {
    const answers = await generateAnswers();
    if (answers) {
      bumpUsage();
      const s = bumpStreak();
      if (answers.__check) {
        renderCheckResult(answers);
      } else {
        renderResults(answers);
      }
      // Wave 3: save interaction to per-crush history (if a crush is selected)
      if (state.selectedCrushId) {
        const mode = state.appMode;
        let input = '';
        if (mode === 'reply') input = $('#msgInput')?.value.trim() || '';
        else if (mode === 'opener') input = $('#openerCtx')?.value.trim() || '';
        else if (mode === 'phrase') input = $('#phraseInput')?.value.trim() || '';
        else if (mode === 'check') input = $('#checkInput')?.value.trim() || '';
        saveCrushInteraction(state.selectedCrushId, {
          mode,
          style: state.selectedStyle,
          situation: state.selectedSituation || 'auto',
          input,
          output: answers.__check ? null : answers,
          checkScore: answers.__check ? answers.score : null,
          checkVerdict: answers.__check ? answers.verdict : null,
        });
      }
      results?.scrollIntoView({ behavior:'smooth', block:'start' });
      haptic(15);
      if (s.count === 1) showToast('🔥 התחלת רצף חדש!', 'success');
    }
  } catch (err) {
    showToast(err.message || 'משהו השתבש', 'error');
    haptic(30);
  } finally {
    state.busy = false;
    if (load) load.classList.remove('active');
    if (btn) btn.disabled = false;
  }
}

function renderResults(answers) {
  const style = STYLES.find(s => s.id === state.selectedStyle);
  const wrap = $('#resultsWrap');
  if (!wrap) return;
  wrap.innerHTML = `
    <div class="results-header">
      <div class="results-title">✨ ${answers.length} ${state.appMode==='opener'?'פתיחות':state.appMode==='phrase'?'ניסוחים':'תשובות'}</div>
      <div class="results-meta">${style?style.emoji+' '+style.label:''}</div>
    </div>
    ${answers.map((a, i) => {
      const ratingKey = encodeURIComponent((state.appMode||'')+'|'+(state.selectedStyle||'')+'|'+a).slice(0, 200);
      const savedRating = getReplyRating(ratingKey);
      return `
      <div class="bubble">
        <div class="bubble-tag">#${i+1}</div>
        <div class="bubble-text">${esc(a)}</div>
        <div class="bubble-actions">
          <button class="action-btn copy-act" data-txt="${esc(a)}">📋 העתק</button>
          <button class="action-btn wa wa-act" data-txt="${esc(a)}">💚 WhatsApp</button>
          <button class="action-btn share-act" data-txt="${esc(a)}">📤 שתף</button>
        </div>
        <div class="rating-row">
          <span class="rating-prompt">איך התשובה הזו?</span>
          <button class="rate-btn ${savedRating==='up'?'active':''}" data-rate="up" data-key="${esc(ratingKey)}">👍</button>
          <button class="rate-btn ${savedRating==='down'?'active':''}" data-rate="down" data-key="${esc(ratingKey)}">👎</button>
        </div>
      </div>
    `;}).join('')}
  `;

  // Wire rating buttons
  $$('.rate-btn', wrap).forEach(b => b.addEventListener('click', () => {
    haptic();
    const key = b.dataset.key;
    const rate = b.dataset.rate;
    saveReplyRating(key, rate);
    // Visual feedback: clear siblings, mark this one
    const row = b.closest('.rating-row');
    if (row) row.querySelectorAll('.rate-btn').forEach(x => x.classList.remove('active'));
    b.classList.add('active');
    showToast(rate==='up' ? 'תודה! זה עוזר לי להשתפר 🙏' : 'הבנתי, לא חיבבת. אשתפר 💪', 'success');
  }));

  $$('.copy-act', wrap).forEach(b => b.addEventListener('click', async () => {
    haptic();
    const txt = b.dataset.txt;
    try { await navigator.clipboard.writeText(txt); }
    catch {
      const ta = document.createElement('textarea'); ta.value = txt;
      document.body.appendChild(ta); ta.select(); document.execCommand('copy'); ta.remove();
    }
    const orig = b.innerHTML;
    b.classList.add('copied'); b.innerHTML = '✓ הועתק!';
    setTimeout(() => { b.classList.remove('copied'); b.innerHTML = orig; }, 1800);
  }));

  $$('.wa-act', wrap).forEach(b => b.addEventListener('click', () => {
    haptic();
    const txt = b.dataset.txt;
    window.open(`https://wa.me/?text=${encodeURIComponent(txt)}`, '_blank');
  }));

  $$('.share-act', wrap).forEach(b => b.addEventListener('click', async () => {
    haptic();
    const txt = b.dataset.txt;
    // Subtle viral footer when sharing externally (not when copying/whatsapping which user wants clean)
    const shareText = `${txt}\n\n— נכתב בעזרת ✨ מה לענות לה?\n${buildInviteUrl()}`;
    if (navigator.share) {
      try { await navigator.share({ text: shareText }); }
      catch {}
    } else {
      try { await navigator.clipboard.writeText(shareText); showToast('הועתק (שיתוף לא נתמך בדפדפן)', 'success'); }
      catch { showToast('לא ניתן לשתף', 'error'); }
    }
  }));
}

// ---- Reply rating storage (local) ----
function getReplyRatings() {
  try { return JSON.parse(localStorage.getItem('replyRatings') || '{}'); }
  catch { return {}; }
}
function getReplyRating(key) {
  return getReplyRatings()[key] || null;
}
function saveReplyRating(key, rate) {
  const all = getReplyRatings();
  all[key] = rate;
  // keep size bounded (last 300 entries)
  const keys = Object.keys(all);
  if (keys.length > 300) {
    keys.slice(0, keys.length - 300).forEach(k => delete all[k]);
  }
  try { localStorage.setItem('replyRatings', JSON.stringify(all)); } catch {}
  // fire-and-forget cloud sync
  cloudSaveRating(key, rate);
}

// ---- Check-message result rendering ----
function renderCheckResult(r) {
  const wrap = $('#resultsWrap');
  if (!wrap) return;
  const score = Math.max(0, Math.min(10, Number(r.score)||0));
  // color and label by score
  let color, label, emoji;
  if (score >= 8)      { color = '#2ece8a'; label = 'תשלח. זה טוב.'; emoji = '✅'; }
  else if (score >= 5) { color = '#ffb547'; label = 'אפשר לשלוח, אבל יש שיפור.'; emoji = '⚠️'; }
  else                 { color = '#ff4d6d'; label = 'אל תשלח. תשפץ קודם.'; emoji = '🚫'; }

  const flags = Array.isArray(r.redFlags) ? r.redFlags : [];
  const strengths = Array.isArray(r.strengths) ? r.strengths : [];
  const rewrite = r.rewrite || '';

  wrap.innerHTML = `
    <div class="check-result">
      <div class="check-score" style="--clr:${color};">
        <div class="check-emoji">${emoji}</div>
        <div class="check-num">${score}<span class="check-of">/10</span></div>
        <div class="check-verdict">${esc(r.verdict || label)}</div>
      </div>

      ${flags.length ? `
        <div class="check-section">
          <div class="check-section-title">🚩 דגלים אדומים</div>
          <ul class="check-list red">
            ${flags.map(f => `<li>${esc(f)}</li>`).join('')}
          </ul>
        </div>
      ` : `<div class="check-section"><div class="check-section-title">🚩 דגלים אדומים</div><div class="text-dim" style="font-size:13px;padding:6px 0;">לא נמצאו דגלים אדומים — יפה!</div></div>`}

      ${strengths.length ? `
        <div class="check-section">
          <div class="check-section-title">✨ מה כן עובד</div>
          <ul class="check-list green">
            ${strengths.map(s => `<li>${esc(s)}</li>`).join('')}
          </ul>
        </div>
      ` : ''}

      ${rewrite ? `
        <div class="check-section">
          <div class="check-section-title">💡 ניסוח טוב יותר</div>
          <div class="check-rewrite">${esc(rewrite)}</div>
          <div class="bubble-actions" style="margin-top:8px;">
            <button class="action-btn copy-act" data-txt="${esc(rewrite)}">📋 העתק ניסוח</button>
            <button class="action-btn wa wa-act" data-txt="${esc(rewrite)}">💚 WhatsApp</button>
          </div>
        </div>
      ` : ''}
    </div>
  `;

  // Wire copy/wa for rewrite
  $$('.copy-act', wrap).forEach(b => b.addEventListener('click', async () => {
    haptic();
    const txt = b.dataset.txt;
    try { await navigator.clipboard.writeText(txt); } catch {}
    const orig = b.innerHTML;
    b.classList.add('copied'); b.innerHTML = '✓ הועתק!';
    setTimeout(() => { b.classList.remove('copied'); b.innerHTML = orig; }, 1800);
  }));
  $$('.wa-act', wrap).forEach(b => b.addEventListener('click', () => {
    haptic();
    window.open(`https://wa.me/?text=${encodeURIComponent(b.dataset.txt)}`, '_blank');
  }));

  // Polish: celebrate high score 🎉
  if (score >= 8) {
    setTimeout(() => confettiBurst(), 200);
  }
}

async function handleCoachAnalyze() {
  const text = (state.coachInput || $('#coachInput')?.value || '').trim();
  if (text.length < 20) { haptic(20); showToast('הדבק שיחה ארוכה יותר (לפחות 20 תווים)', 'error'); return; }
  if (state.coachAnalyzing) return;

  haptic();
  state.coachAnalyzing = true;
  state.coachStage = 'קורא את השיחה';
  render();

  const stages = ['מנתח טון ושפה', 'מודד רמת עניין', 'חושב על תשובות', 'בודק תזמון'];
  let stageIdx = 0;
  const stageInterval = setInterval(() => {
    if (stageIdx < stages.length) {
      state.coachStage = stages[stageIdx++];
      const el = document.querySelector('.coach-analyzing .stage');
      if (el) el.textContent = state.coachStage;
    }
  }, 1400);

  try {
    const crush = state.crushes.find(c => c.id === state.selectedCrushId) || null;
    const payload = {
      mode: 'coach',
      text,
      crush, crushId: state.selectedCrushId,
      userGender: state.profile?.gender || null,
      userName: state.user?.user_metadata?.full_name || null,
    };
    const r = await fetch(`${CONFIG.SUPABASE_URL}/functions/v1/chat-replies`, {
      method:'POST',
      headers:{ 'Content-Type':'application/json', 'apikey':CONFIG.SUPABASE_ANON_KEY, 'Authorization':`Bearer ${CONFIG.SUPABASE_ANON_KEY}` },
      body: JSON.stringify(payload)
    });
    if (!r.ok) {
      let m = `שגיאה (${r.status})`;
      try { const j = await r.json(); if (j.error) m += `: ${j.error}`; } catch {}
      throw new Error(m);
    }
    const result = await r.json();
    clearInterval(stageInterval);
    state.coachAnalyzing = false;
    state.coachResult = result;
    saveCoachHistory({
      preview: text.slice(0, 80),
      interest: result.interest,
      tone: result.tone,
      result
    });
    bumpStreak();
    haptic(15);
    render();
  } catch (err) {
    clearInterval(stageInterval);
    state.coachAnalyzing = false;
    render();
    showToast(err.message || 'משהו השתבש', 'error');
  }
}

      <button class="sheet-close" onclick="closeSheet()">✕</button>

async function getAdminAuthHeader() {
  const { data: { session } } = await sb.auth.getSession();
  if (!session?.access_token) throw new Error('לא מחובר');
  return { 'Authorization': `Bearer ${session.access_token}`, 'apikey': CONFIG.SUPABASE_ANON_KEY };
}

async function fetchAdminUsers(search = '') {
  const headers = await getAdminAuthHeader();
  const r = await fetch(`${CONFIG.SUPABASE_URL}/functions/v1/admin-users`, {
    method: 'POST',
    headers: { ...headers, 'Content-Type': 'application/json' },
    body: JSON.stringify({ search }),
  });
  if (!r.ok) {
    const txt = await r.text().catch(()=>'');
    throw new Error(`שגיאה (${r.status}) ${txt}`);
  }
  return r.json();
}

async function adminUpdateTier(userId, tier, cycle = 'monthly', days = 30) {
  const headers = await getAdminAuthHeader();
  const r = await fetch(`${CONFIG.SUPABASE_URL}/functions/v1/admin-update-tier`, {
    method: 'POST',
    headers: { ...headers, 'Content-Type': 'application/json' },
    body: JSON.stringify({ user_id: userId, tier, cycle, days }),
  });
  if (!r.ok) {
    const txt = await r.text().catch(()=>'');
    throw new Error(`שגיאה (${r.status}) ${txt}`);
  }
  return r.json();
}

function formatAdminDate(iso) {
  if (!iso) return '—';
  const d = new Date(iso);
  return d.toLocaleDateString('he-IL') + ' ' + d.toLocaleTimeString('he-IL', { hour:'2-digit', minute:'2-digit' });
}
function adminDaysUntil(iso) {
  if (!iso) return null;
  const ms = new Date(iso).getTime() - Date.now();
  return Math.ceil(ms / 86400000);
}

async function openAdminSheet(search = '') {
  openSheet(`
    <div class="sheet-title">🛡️ לוח בקרת אדמין</div>
    <div class="sheet-sub">תצוגה ושליטה ידנית במשתמשים ובמנויים.</div>

    <div id="adminUsersList">
      ${users.length === 0 ? `<div style="text-align:center;padding:20px;color:var(--text-3);">אין משתמשים תואמים</div>` : users.map(u => {

function attachAdminHandlers() {
  let timer;
  $('#adminSearchInput')?.addEventListener('input', (e) => {
    clearTimeout(timer);
    const q = e.target.value;
    timer = setTimeout(async () => {
      try {
        const data = await fetchAdminUsers(q);
        renderAdminBody(data, q);
      } catch {}
    }, 350);
  });
  $$('#adminUsersList .au-edit').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      haptic();
      openAdminEditTierSheet({
        userId: btn.dataset.uid,
        email: btn.dataset.email,
        currentTier: btn.dataset.tier,
      });
    });
  });

  openSheet(`

    <div class="sheet-sub">${esc(email)}</div>

      <button data-tier="plus" class="${pickedTier==='plus'?'active':''}">⭐ Plus</button>
      <button data-tier="pro"  class="${pickedTier==='pro'?'active':''}">💎 Pro</button>
    </div>

    <div id="aetCycleWrap" style="${pickedTier==='free'?'display:none;':''}">

      <div class="admin-cycle-picker" id="aetCycle">
        <button data-cycle="monthly" class="active">חודשי (30 יום)</button>

      </div>
    </div>

      ⚠️ זוהי עקיפה ידנית — מסומן ב-user_metadata כ-manual_override.
      אם המשתמש משלם דרך Stripe, ה-Webhook ישכתב את זה.
    </div>

    <button class="btn btn-primary" id="aetSave">שמור שינוי</button>
  `);

  const refresh = () => {
    $$('#aetTier button').forEach(b => b.classList.toggle('active', b.dataset.tier === pickedTier));
    $('#aetCycleWrap').style.display = (pickedTier === 'free') ? 'none' : '';

  $$('#aetTier button').forEach(b => {

  });
  $$('#aetCycle button').forEach(b => {

      showToast(err.message || 'שגיאה', 'error');
