}

// ---- Crush history timeline sheet ----
function openCrushHistorySheet(crush) {
  const items = getCrushInteractions(crush.id);
  const modeLabels = { reply:'💬 תשובה', opener:'🚀 פתיחה', phrase:'✍️ ניסוח', check:'🔍 בדיקה' };

  openSheet(`
    <div class="sheet-title">📜 היסטוריית שיחה — ${esc(crush.name)}</div>
    <div class="sheet-sub">${items.length===0 ? 'עדיין אין אינטראקציות. כל פעם שתפיק תשובות עם הפרופיל הזה — זה יישמר כאן.' : `${items.length} אינטראקציות אחרונות. ה-AI משתמש ב-3 האחרונות לרצף.`}</div>

    ${items.length === 0 ? `
      <div class="empty-state" style="padding:20px 10px;">
        <div class="empty-emoji">💭</div>
        <div class="empty-title">בלי היסטוריה — בלי זיכרון</div>
        <div class="empty-sub">בחר את הפרופיל בעמוד הבית, ועשה אינטראקציה ראשונה.</div>
      </div>
    ` : `
      <div class="history-list">
        ${items.map(i => `
          <div class="history-item" data-ts="${i.ts}">
            <div class="history-head">
              <span class="history-mode">${modeLabels[i.mode] || i.mode}</span>
              <span class="history-when">${formatRelTime(i.ts)}</span>
              <button class="history-del" data-ts="${i.ts}" title="מחק">🗑</button>
            </div>
            ${i.input ? `<div class="history-input">${i.mode==='reply'?'📩 קיבלה: ':i.mode==='phrase'?'✍️ רצה להגיד: ':i.mode==='check'?'🔍 בדק: ':'📝 הקשר: '}"${esc(i.input)}"</div>` : ''}
            ${i.checkScore != null ? `<div class="history-out">ציון: ${i.checkScore}/10 · ${esc(i.checkVerdict || '')}</div>` : ''}
            ${Array.isArray(i.output) ? `
              <div class="history-out">
                <div class="history-style-tag">סגנון: ${esc(i.style || '?')}</div>
                ${i.output.slice(0, 3).map((a, idx) => `<div class="history-answer">${idx+1}. ${esc(a)}</div>`).join('')}
              </div>
            ` : ''}
          </div>
        `).join('')}
      </div>
      <div style="margin-top:18px; display:flex; gap:10px;">
        <button class="btn btn-secondary" id="histClearAll" style="flex:1;">🗑 נקה הכל</button>
      </div>
    `}
  `);

  $$('.history-del').forEach(b => b.addEventListener('click', () => {
    haptic(15);
    const ts = Number(b.dataset.ts);
    deleteCrushInteraction(crush.id, ts);
    openCrushHistorySheet(crush); // re-render
  }));
  $('#histClearAll')?.addEventListener('click', () => {
    haptic(20);
    if (!confirm(`למחוק את כל ההיסטוריה עם ${crush.name}?`)) return;
    clearCrushHistory(crush.id);
    closeSheet();
    render();
    showToast('היסטוריה נמחקה', 'success');
  });
}

function openProfileSheet() {
  openSheet(`
    <div class="sheet-title">עריכת פרופיל</div>
    <div class="sheet-sub">הפרטים שלך - לא של מי שמדבר איתך</div>
    <div class="input-row">
      <label class="label">👤 השם שלך</label>
      <input class="input" id="pfName" value="${esc(state.user?.user_metadata?.full_name||'')}" />
    </div>
    <div class="input-row">
      <label class="label">📅 תאריך לידה</label>
      <input class="input" id="pfBirth" type="date" value="${state.profile?.birth_date||''}" />
    </div>
    <div class="input-row">
      <label class="label">⚧ מגדר</label>
      <select class="input" id="pfGender">
        <option value="male" ${state.profile?.gender==='male'?'selected':''}>זכר</option>
        <option value="female" ${state.profile?.gender==='female'?'selected':''}>נקבה</option>
        <option value="other" ${state.profile?.gender==='other'?'selected':''}>אחר</option>
      </select>
    </div>
    <div class="input-row">
      <label class="label">🎯 מטרת השימוש</label>
      <select class="input" id="pfPurpose">
        <option value="dating" ${state.profile?.usage_purpose==='dating'?'selected':''}>דייטים</option>
        <option value="relationship" ${state.profile?.usage_purpose==='relationship'?'selected':''}>זוגיות</option>
        <option value="friends" ${state.profile?.usage_purpose==='friends'?'selected':''}>חברים</option>
        <option value="work" ${state.profile?.usage_purpose==='work'?'selected':''}>עבודה</option>
        <option value="family" ${state.profile?.usage_purpose==='family'?'selected':''}>משפחה</option>
        <option value="other" ${state.profile?.usage_purpose==='other'?'selected':''}>אחר</option>
      </select>
    </div>
    <button class="btn btn-primary" id="pfSave">💾 שמור</button>
  `);
  $('#pfSave').addEventListener('click', async () => {
    const name = $('#pfName').value.trim();
    const birth = $('#pfBirth').value;
    const gender = $('#pfGender').value;
    const purpose = $('#pfPurpose').value;
    if (!name || !birth || !gender || !purpose) { showToast('מלא הכל', 'error'); return; }
    haptic(); $('#pfSave').disabled = true;
    try {
      const { data: u } = await sb.auth.updateUser({ data: { full_name: name } });
      if (u?.user) state.user = u.user;
      await saveProfile({ birth_date: birth, gender, usage_purpose: purpose });
      closeSheet(); render(); showToast('פרופיל עודכן', 'success');
    } catch (err) { $('#pfSave').disabled=false; showToast(err.message, 'error'); }
  });
}

// ===================================================================
// STRIPE RETURN HANDLER
// ===================================================================

async function handleStripeReturn() {
  const p = new URLSearchParams(location.search);
  const status = p.get('stripe_status');
  if (!status || !state.user) return;
  history.replaceState({}, '', location.pathname + location.hash);
  if (status === 'success') {
    try { const { data: { user } } = await sb.auth.getUser(); if (user) state.user = user; } catch {}
    const tier = p.get('tier'), cycle = p.get('cycle');
    if (tier && (tier==='plus'||tier==='pro') && getTier()==='free') {
      const days = cycle === 'yearly' ? 365 : 30;
      const expiry = new Date(Date.now() + days*86400000).toISOString();
      try {
        const { data: updated } = await sb.auth.updateUser({
          data: { subscription_tier:tier, subscription_expiry:expiry, subscription_cycle:cycle, pending_stripe_verification:true }
        });
        if (updated?.user) state.user = updated.user;
      } catch {}
    }
    setTimeout(() => showToast('🎉 התשלום התקבל! המנוי שלך פעיל.', 'success'), 400);
    haptic(40);
    render();
  } else if (status === 'cancel') {
    setTimeout(() => showToast('התשלום בוטל', 'error'), 300);
  }
}

// ===================================================================
// INIT
// ===================================================================

async function init() {
  captureReferralFromUrl(); // ?ref=USERID → save to localStorage for future credit
  render(); // boot screen

  const { data: { session } } = await sb.auth.getSession();
  if (session?.user) {
    state.user = session.user;
    await loadProfile();
    await loadCrushes();
    pullCloudData(); // fire-and-forget — populates local history/ratings from cloud
    afterAuth();
  } else {
    state.screen = 'auth';
    render();
  }
  await handleStripeReturn();

  sb.auth.onAuthStateChange(async (event, sess) => {
    if (event === 'SIGNED_OUT') {
      state.user=null; state.profile=null; state.crushes=[];
      state.screen='auth'; render();
    } else if (event === 'SIGNED_IN' && sess) {
      state.user = sess.user;
      await loadProfile();
      await loadCrushes();
      pullCloudData(); // fire-and-forget — sync history/ratings from cloud
      afterAuth();
    }
  });

  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  }
}

function afterAuth() {
  const hasProfile = state.user?.user_metadata?.full_name && state.profile?.birth_date && state.profile?.gender && state.profile?.usage_purpose;
  const introDone = localStorage.getItem('mll2_intro_done') === '1';
  const paywallShown = localStorage.getItem(`mll2_paywall_shown_${state.user?.id}`) === '1';
  if (!introDone) { state.screen = 'onboardIntro'; state.onboardIntroIdx = 0; }
  else if (!hasProfile) state.screen = 'onboardProfile';
  else if (!paywallShown && getTier() === 'free') state.screen = 'paywall';
  else state.screen = 'main';
  render();
}

// Global paste handler for image
document.addEventListener('paste', (e) => {
  if (!state.user || state.screen !== 'main' || state.appMode !== 'reply') return;
  const items = e.clipboardData?.items;
  if (!items) return;
  for (const it of items) {
    if (it.type.startsWith('image/')) {
      const f = it.getAsFile();
      if (f) {
        const r = new FileReader();
        r.onload = (ev) => {
          const url = ev.target.result;
          state.imageBase64 = url.split(',')[1];
          state.imageMediaType = f.type;
          state.inputMode = 'image';
          render();
          showToast('תמונה צורפה ✓', 'success');
          haptic();
        };
        r.readAsDataURL(f);
        e.preventDefault();
        break;
      }
    }
  }
});

init();
</script>
